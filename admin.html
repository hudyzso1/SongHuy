    <script>
        "use strict";

        const SERVER_URL =
            window.CYBERNET_CONFIG?.LOCAL_API_URL ||
            "http://127.0.0.1:3000";

        const CLOUD_API_URL =
            window.CYBERNET_CONFIG?.CLOUD_API_URL ||
            "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

        let selectedMachine = "";

        function showToast(text, type = "success") {
            const backgrounds = {
                success: "#06b6d4",
                error: "#ef4444",
                warning: "#f59e0b"
            };

            Toastify({
                text,
                duration: 3000,
                close: true,
                gravity: "top",
                position: "right",
                style: {
                    background: backgrounds[type] || backgrounds.success,
                    color: "#fff",
                    fontWeight: "bold",
                    borderRadius: "10px"
                }
            }).showToast();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);

            let data = null;

            try {
                data = await response.json();
            } catch {
                data = null;
            }

            if (!response.ok) {
                throw new Error(
                    data?.error ||
                    data?.message ||
                    `HTTP ${response.status}`
                );
            }

            return data;
        }

        async function fetchRevenue() {
            try {
                const data = await fetchJson(
                    `${SERVER_URL}/api/revenue`
                );

                const revenue = Number(data?.revenue) || 0;

                document.getElementById(
                    "revenue-display"
                ).innerText = `${revenue.toLocaleString("vi-VN")}đ`;
            } catch (error) {
                console.error("Lỗi tải doanh thu:", error);
            }
        }

        async function syncWithServer() {
            const container =
                document.getElementById("device-container");

            try {
                const devices = await fetchJson(
                    `${SERVER_URL}/api/sync-devices`
                );

                if (!Array.isArray(devices) || devices.length === 0) {
                    container.innerHTML = `
                        <p class="col-span-2 text-xs text-gray-500 text-center py-4">
                            Chưa có máy trạm nào!
                        </p>
                    `;
                    return;
                }

                container.innerHTML = devices.map(device => {
                    const username = escapeHtml(device.username);
                    const usernameForJs = encodeURIComponent(
                        String(device.username || "")
                    );

                    const status = escapeHtml(device.status);
                    const timeRemaining = escapeHtml(
                        device.time_remaining
                    );

                    const money =
                        Number(device.money) || 0;

                    const isPlaying =
                        device.status === "playing";

                    const isSelected =
                        selectedMachine ===
                        String(device.username || "")
                            .toLowerCase();

                    return `
                        <div
                            data-machine="${usernameForJs}"
                            onclick="selectMachine(
                                decodeURIComponent(this.dataset.machine)
                            )"
                            class="machine-btn border p-3 rounded-xl flex flex-col justify-between
                                ${
                                    isPlaying
                                        ? "border-green-950 bg-green-950/40 text-green-400"
                                        : "border-red-900/50 bg-red-950/30 text-red-400"
                                }
                                ${
                                    isSelected
                                        ? "border-cyan-400 ring-2 ring-cyan-500/30 font-black"
                                        : ""
                                }"
                        >
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold">
                                    ${username.toUpperCase()}
                                </span>

                                <span class="text-[9px] uppercase px-1.5 py-0.5 rounded-md bg-black/40 font-mono">
                                    ${status}
                                </span>
                            </div>

                            <div class="space-y-0.5 mt-1 text-left">
                                <p class="text-[10px] opacity-80">
                                    ⏰ Còn:
                                    <span class="font-mono font-bold">
                                        ${timeRemaining}
                                    </span>
                                </p>

                                <p class="text-[10px] opacity-80">
                                    💰 Quỹ:
                                    <span>
                                        ${money.toLocaleString("vi-VN")}đ
                                    </span>
                                </p>
                            </div>
                        </div>
                    `;
                }).join("");
            } catch (error) {
                console.error("Lỗi đồng bộ máy trạm:", error);

                container.innerHTML = `
                    <p class="col-span-2 text-xs text-red-400 text-center py-4">
                        Không kết nối được server local.
                    </p>
                `;
            }
        }

        window.selectMachine = function (machineName) {
            selectedMachine = String(machineName || "")
                .toLowerCase()
                .trim();

            document.getElementById(
                "current-monitoring-title"
            ).innerText = selectedMachine
                ? selectedMachine.toUpperCase()
                : "CHƯA CHỌN";

            const text =
                document.getElementById("screen-text");

            text.classList.remove("hidden");
            text.innerText =
                "ĐANG TẢI DỮ LIỆU CAMERA...";

            syncWithServer();
            updateLiveScreenshot();
        };

        async function updateLiveScreenshot() {
            if (!selectedMachine) return;

            const image =
                document.getElementById("screen-may01");

            const text =
                document.getElementById("screen-text");

            try {
                const data = await fetchJson(
                    `${SERVER_URL}/api/monitor/may01?machine=${
                        encodeURIComponent(selectedMachine)
                    }`
                );

                if (data?.image) {
                    image.src = data.image;
                    image.classList.remove("hidden");
                    text.classList.add("hidden");
                } else {
                    image.removeAttribute("src");
                    image.classList.add("hidden");
                    text.classList.remove("hidden");
                    text.innerText =
                        "CHƯA NHẬN ĐƯỢC TÍN HIỆU TỪ MÁY KHÁCH NÀY!";
                }
            } catch (error) {
                console.error("Lỗi tải ảnh màn hình:", error);

                image.classList.add("hidden");
                text.classList.remove("hidden");
                text.innerText =
                    "KHÔNG KẾT NỐI ĐƯỢC MÁY KHÁCH!";
            }
        }

        window.adminTopUp = async function () {
            const button =
                document.getElementById("btn-topup");

            const usernameInput =
                document.getElementById("topup-username");

            const amountInput =
                document.getElementById("topup-amount");

            const username =
                usernameInput.value.trim();

            const amount =
                Number(amountInput.value);

            if (
                !username ||
                !Number.isFinite(amount) ||
                amount <= 0
            ) {
                showToast(
                    "Vui lòng nhập đúng tên máy và số tiền!",
                    "error"
                );
                return;
            }

            button.disabled = true;
            button.innerText = "ĐANG XỬ LÝ...";

            try {
                const data = await fetchJson(
                    `${SERVER_URL}/api/admin-topup`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify({
                            username,
                            amount
                        })
                    }
                );

                await fetchJson(
                    `${SERVER_URL}/api/revenue`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify({
                            amount
                        })
                    }
                );

                usernameInput.value = "";
                amountInput.value = "";

                showToast(
                    data?.msg || "Nạp tiền thành công!",
                    "success"
                );

                await Promise.all([
                    fetchRevenue(),
                    syncWithServer()
                ]);
            } catch (error) {
                console.error("Lỗi nạp tiền:", error);
                showToast(error.message, "error");
            } finally {
                button.disabled = false;
                button.innerText = "XÁC NHẬN NẠP";
            }
        };
        const productImageInput =
    document.getElementById("newProductImage");

const productImagePreview =
    document.getElementById("newProductImagePreview");

const productImagePlaceholder =
    document.getElementById("newProductImagePlaceholder");

let productPreviewObjectUrl = null;

productImageInput.addEventListener("change", () => {
    const file = productImageInput.files?.[0];

    if (productPreviewObjectUrl) {
        URL.revokeObjectURL(productPreviewObjectUrl);
        productPreviewObjectUrl = null;
    }

    if (!file) {
        productImagePreview.removeAttribute("src");
        productImagePreview.classList.add("hidden");
        productImagePlaceholder.classList.remove("hidden");
        return;
    }

    const allowedTypes = [
        "image/jpeg",
        "image/png",
        "image/webp"
    ];

    if (!allowedTypes.includes(file.type)) {
        productImageInput.value = "";

        showToast(
            "Chỉ hỗ trợ ảnh JPG, PNG hoặc WEBP!",
            "error"
        );

        return;
    }

    if (file.size > 5 * 1024 * 1024) {
        productImageInput.value = "";

        showToast(
            "Ảnh không được vượt quá 5 MB!",
            "error"
        );

        return;
    }

    productPreviewObjectUrl =
        URL.createObjectURL(file);

    productImagePreview.src =
        productPreviewObjectUrl;

    productImagePreview.classList.remove("hidden");
    productImagePlaceholder.classList.add("hidden");
});
        async function uploadProductImage(file) {
    const uploadInfo = await fetchJson(
        `${CLOUD_API_URL}/api/products/upload-url`,
        {
            method: "POST",
            headers: {
                "Content-Type":
                    "application/json; charset=utf-8"
            },
            body: JSON.stringify({
                fileName: file.name,
                contentType: file.type,
                fileSize: file.size
            })
        }
    );

    const uploadResponse = await fetch(
        uploadInfo.uploadUrl,
        {
            method: "PUT",
            headers: {
                "Content-Type": file.type
            },
            body: file
        }
    );

    if (!uploadResponse.ok) {
        throw new Error(
            `Upload ảnh thất bại: HTTP ${uploadResponse.status}`
        );
    }

    return uploadInfo.imageKey;
}
        async function loadProducts() {
            const list =
                document.getElementById("adminProductList");

            list.innerHTML = `
                <p class="text-gray-500 italic text-sm">
                    Đang tải sản phẩm...
                </p>
            `;

            try {
                const data = await fetchJson(
                    `${CLOUD_API_URL}/api/products`
                );

                const products =
                    Array.isArray(data) ? data : [];

                if (products.length === 0) {
                    list.innerHTML = `
                        <p class="text-gray-500 italic text-sm">
                            Chưa có sản phẩm.
                        </p>
                    `;
                    return;
                }

                list.innerHTML = products.map(product => {
                    const id =
                        escapeHtml(product.id);

                    const name =
                        escapeHtml(product.name);

                    const price =
                        Number(product.price) || 0;

                    const stock =
                        Number(product.stock) || 0;

                    return `
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-md">
        <div class="w-full h-36 bg-gray-950 flex items-center justify-center overflow-hidden">
            ${
                product.imageUrl
                    ? `
                        <img
                            src="${escapeHtml(product.imageUrl)}"
                            alt="${name}"
                            class="w-full h-full object-cover"
                            loading="lazy"
                        >
                    `
                    : `
                        <div class="text-gray-600 text-xs text-center">
                            <i class="fas fa-image text-3xl mb-2 block"></i>
                            CHƯA CÓ ẢNH
                        </div>
                    `
            }
        </div>

        <div class="p-4 flex justify-between items-center">
            <div>
                <p class="text-white font-bold text-sm mb-1">
                    ${name}
                </p>

                <p class="text-cyan-400 font-bold text-sm">
                    ${price.toLocaleString("vi-VN")}đ

                    <span class="text-gray-500 text-xs ml-1">
                        (Tồn: ${stock})
                    </span>
                </p>
            </div>

            <button
                type="button"
                data-product-id="${id}"
                onclick="deleteProduct(this.dataset.productId)"
                class="bg-red-900/60 hover:bg-red-600 text-red-200 px-3 py-1.5 rounded-lg text-xs font-bold transition"
            >
                XÓA
            </button>
        </div>
    </div>
`;
                }).join("");
            } catch (error) {
                console.error("Lỗi tải sản phẩm:", error);

                list.innerHTML = `
                    <p class="text-red-400 text-sm">
                        Không thể tải sản phẩm từ AWS.
                    </p>
                `;

                showToast(error.message, "error");
            }
        }

        window.addNewProduct = async function () {
    const nameInput =

    const priceInput =
        document.getElementById("newProductPrice");

    const stockInput =
        document.getElementById("newProductStock");

    const imageInput =
        document.getElementById("newProductImage");

    const name =
        nameInput.value.trim();

    const price =
        Number(priceInput.value);

    const stock =
        Number(stockInput.value);

    const imageFile =
        imageInput.files?.[0] || null;

    if (!name) {
        showToast(
            "Vui lòng nhập tên món!",
            "error"
        );

        nameInput.focus();
        return;
    }

    if (!Number.isFinite(price) || price < 0) {
        showToast(
            "Giá sản phẩm không hợp lệ!",
            "error"
        );

        priceInput.focus();
        return;
    }

    if (!Number.isInteger(stock) || stock < 0) {
        showToast(
            "Tồn kho phải là số nguyên không âm!",
            "error"
        );

        stockInput.focus();
        return;
    }

    try {
        let imageKey = "";

        if (imageFile) {
            showToast(
                "Đang upload ảnh lên S3...",
                "warning"
            );

            imageKey =
                await uploadProductImage(imageFile);
        }

        await fetchJson(
            `${CLOUD_API_URL}/api/products`,
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/json; charset=utf-8"
                },
                body: JSON.stringify({
                    name,
                    price,
                    stock,
                    imageKey
                })
            }
        );

        nameInput.value = "";
        priceInput.value = "";
        stockInput.value = "";
        imageInput.value = "";

        if (productPreviewObjectUrl) {
            URL.revokeObjectURL(
                productPreviewObjectUrl
            );

            productPreviewObjectUrl = null;
        }

        productImagePreview.removeAttribute("src");
        productImagePreview.classList.add("hidden");
        productImagePlaceholder.classList.remove("hidden");

        await loadProducts();

        showToast(
            "Thêm món và ảnh thành công!",
            "success"
        );
    } catch (error) {
        console.error(
            "Lỗi thêm sản phẩm:",
            error
        );

        showToast(
            error.message,
            "error"
        );
    }
};

        window.deleteProduct = async function (id) {
            if (!id) {
                showToast(
                    "Không tìm thấy mã sản phẩm!",
                    "error"
                );
                return;
            }

            const confirmed = window.confirm(
                "M có chắc muốn xóa sản phẩm này không?"
            );

            if (!confirmed) return;

            try {
                await fetchJson(
                    `${CLOUD_API_URL}/api/products/${
                        encodeURIComponent(id)
                    }`,
                    {
                        method: "DELETE"
                    }
                );

                await loadProducts();

                showToast(
                    "Đã xóa món!",
                    "success"
                );
            } catch (error) {
                console.error(
                    "Lỗi xóa sản phẩm:",
                    error
                );

                showToast(
                    error.message,
                    "error"
                );
            }
        };

        async function loadOrders() {
            const list =
                document.getElementById("adminOrderList");

            try {
                const data = await fetchJson(
                    `${SERVER_URL}/api/orders`
                );

                const orders =
                    Array.isArray(data) ? data : [];

                const pendingOrders = orders.filter(
                    order => order.status === "pending"
                );

                if (pendingOrders.length === 0) {
                    list.innerHTML = `
                        <p class="text-gray-500 italic text-sm py-2">
                            Hiện tại không có đơn hàng nào chờ duyệt...
                        </p>
                    `;
                    return;
                }

                list.innerHTML = pendingOrders.map(order => {
                    const id =
                        escapeHtml(order.id);

                    const machineName =
                        escapeHtml(order.machineName);

                    const machineForJs =
                        encodeURIComponent(
                            String(order.machineName || "")
                        );

                    const time =
                        escapeHtml(order.time);

                    const itemsSummary =
                        escapeHtml(order.itemsSummary);

                    const totalAmount =
                        Number(order.totalAmount) || 0;

                    return `
                        <div class="bg-gray-900 border border-gray-800 border-l-4 border-l-orange-500 p-4 rounded-xl flex justify-between items-center shadow-md">
                            <div>
                                <p class="text-cyan-400 font-bold text-sm mb-1 uppercase">
                                    MÁY: ${machineName}

                                    <span class="text-gray-500 text-xs font-normal normal-case ml-2">
                                        - ${time}
                                    </span>
                                </p>

                                <p class="text-white text-sm mb-1">
                                    ${itemsSummary}
                                </p>

                                <p class="text-orange-400 font-bold text-sm">
                                    Tổng tiền:
                                    ${totalAmount.toLocaleString("vi-VN")}đ
                                </p>
                            </div>

                            <button
                                type="button"
                                data-order-id="${id}"
                                data-machine="${machineForJs}"
                                onclick="verifyOrder(
                                    this.dataset.orderId,
                                    decodeURIComponent(
                                        this.dataset.machine
                                    )
                                )"
                                class="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded-lg text-sm font-bold transition"
                            >
                                ✓ XÁC NHẬN
                            </button>
                        </div>
                    `;
                }).join("");
            } catch (error) {
                console.error("Lỗi tải đơn hàng:", error);

                list.innerHTML = `
                    <p class="text-red-400 text-sm py-2">
                        Không tải được đơn hàng từ server local.
                    </p>
                `;
            }
        }

        window.verifyOrder = async function (
            orderId,
            machineName
        ) {
            try {
                await fetchJson(
                    `${SERVER_URL}/api/orders/${
                        encodeURIComponent(orderId)
                    }`,
                    {
                        method: "PUT"
                    }
                );

                await Promise.all([
                    fetchRevenue(),
                    loadOrders()
                ]);

                showToast(
                    `Đã xác nhận đơn hàng cho ${
                        String(machineName || "").toUpperCase()
                    }!`,
                    "success"
                );
            } catch (error) {
                console.error(
                    "Lỗi xác nhận đơn hàng:",
                    error
                );

                showToast(
                    error.message,
                    "error"
                );
            }
        };

        window.toggleAdminChat = function () {
            const chatBox =
                document.getElementById("admin-chat-box");

            const badge =
                document.getElementById("admin-chat-badge");

            chatBox.classList.toggle("hidden");
            badge.classList.add("hidden");

            fetchJson(
                `${SERVER_URL}/api/chat/read`,
                {
                    method: "PUT",
                    headers: {
                        "Content-Type":
                            "application/json; charset=utf-8"
                    },
                    body: JSON.stringify({
                        reader: "admin"
                    })
                }
            ).catch(error => {
                console.error(
                    "Lỗi đánh dấu chat đã đọc:",
                    error
                );
            });
        };

        window.adminReply = async function () {
            const input =
                document.getElementById("admin-chat-input");

            const message =
                input.value.trim();

            if (!message) return;

            const targetMachine =
                selectedMachine || "may02";

            try {
                await fetchJson(
                    `${SERVER_URL}/api/chat`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify({
                            machine: targetMachine
                                .toLowerCase()
                                .trim(),
                            from: "admin",
                            msg: message,
                            time: new Date()
                                .toLocaleTimeString("vi-VN"),
                            read: false
                        })
                    }
                );

                input.value = "";

                await renderAdminChat();
            } catch (error) {
                console.error("Lỗi gửi chat:", error);
                showToast(error.message, "error");
            }
        };

        async function renderAdminChat() {
            const box =
                document.getElementById(
                    "admin-chat-messages"
                );

            const badge =
                document.getElementById(
                    "admin-chat-badge"
                );

            if (!box) return;

            try {
                const data = await fetchJson(
                    `${SERVER_URL}/api/chat`
                );

                const chats =
                    Array.isArray(data) ? data : [];

                box.innerHTML = chats.map(chat => {
                    const fromAdmin =
                        chat.from === "admin";

                    const machine =
                        escapeHtml(
                            chat.machine || "KHÁCH"
                        ).toUpperCase();

                    const message =
                        escapeHtml(chat.msg);

                    const time =
                        escapeHtml(chat.time);

                    return `
                        <div class="${
                            fromAdmin
                                ? "text-right"
                                : "text-left"
                        }">
                            <p class="inline-block ${
                                fromAdmin
                                    ? "bg-cyan-900 text-cyan-200"
                                    : "bg-gray-800 text-gray-200"
                            } p-2 rounded text-xs">
                                <strong class="text-orange-400">
                                    [${machine}]:
                                </strong>

                                ${message}
                            </p>

                            <p class="text-[9px] text-gray-500">
                                ${time}
                            </p>
                        </div>
                    `;
                }).join("");

                box.scrollTop =
                    box.scrollHeight;

                const hasUnread = chats.some(
                    chat =>
                        chat.from !== "admin" &&
                        !chat.read
                );

                const chatBox =
                    document.getElementById(
                        "admin-chat-box"
                    );

                if (
                    hasUnread &&
                    chatBox.classList.contains("hidden")
                ) {
                    badge.classList.remove("hidden");
                } else {
                    badge.classList.add("hidden");
                }
            } catch (error) {
                console.error("Lỗi tải chat:", error);
            }
        }

        document.addEventListener(
            "DOMContentLoaded",
            async () => {
                await Promise.allSettled([
                    fetchRevenue(),
                    loadProducts(),
                    loadOrders(),
                    syncWithServer(),
                    renderAdminChat()
                ]);

                setInterval(syncWithServer, 1000);
                setInterval(updateLiveScreenshot, 2000);
                setInterval(loadOrders, 2000);
                setInterval(renderAdminChat, 2000);
            }
        );
    </script>
</body>
</html>
