<!DOCTYPE html>
<html lang="vi">
<script src="config.js"></script> 
<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    const originalFetch = window.fetch.bind(window);

    window.fetch = function (input, init) {
        let url = "";

        if (typeof input === "string") {
            url = input;
        } else if (input && input.url) {
            url = input.url;
        }

        if (url.includes("/api/chat")) {
            const newUrl = CLOUD_API_URL + "/api/chat";

            console.log("CyberNet chat redirected to AWS:", newUrl);

            if (typeof input === "string") {
                return originalFetch(newUrl, init);
            }

            const newRequest = new Request(newUrl, input);
            return originalFetch(newRequest, init);
        }

        return originalFetch(input, init);
    };
})();
</script>

    <script src="./config.js"></script>

    <script>
        "use strict";

        const SERVER_URL =
            window.CYBERNET_CONFIG?.LOCAL_API_URL ||
            "http://127.0.0.1:3000";

        const CLOUD_API_URL =
            window.CYBERNET_CONFIG?.CLOUD_API_URL ||
            "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

        const user =
            localStorage.getItem("session_user");

        if (!user) {
            window.location.href =
                "index.html";
        }

        const normalizedUser =
            String(user || "")
                .toLowerCase()
                .trim();

        document.getElementById(
            "client-name"
        ).innerText =
            String(user || "").toUpperCase();

        let clientCart = [];
        let foodPaymentCheckInterval = null;

        function showToast(
            text,
            type = "success"
        ) {
            const color =
                type === "error"
                    ? "#ef4444"
                    : type === "warning"
                        ? "#f59e0b"
                        : "#06b6d4";

            Toastify({
                text,
                duration: 3000,
                gravity: "top",
                position: "right",
                style: {
                    background: color,
                    color: "#fff",
                    fontWeight: "bold",
                    borderRadius: "10px"
                }
            }).showToast();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchJson(
            url,
            options = {}
        ) {
            const response =
                await fetch(url, options);

            let data = null;

            try {
                data = await response.json();
            } catch {
                data = null;
            }

            if (!response.ok) {
                throw new Error(
                    data?.error ||
                    data?.message ||
                    `HTTP ${response.status}`
                );
            }

            return data;
        }

        function createOrderId() {
            if (
                window.crypto &&
                typeof window.crypto.randomUUID === "function"
            ) {
                return window.crypto.randomUUID();
            }

            return `${Date.now()}-${Math.random()
                .toString(16)
                .slice(2)}`;
        }

        window.logout = function () {
            localStorage.removeItem(
                "session_user"
            );

            window.location.href =
                "index.html";
        };

        async function loadMenuFromAdmin() {
            const menuGrid =
                document.getElementById(
                    "client-menu-grid"
                );

            menuGrid.innerHTML = `
                <p class="text-gray-500 text-sm italic col-span-2">
                    Đang tải thực đơn từ AWS...
                </p>
            `;

            try {
                const products =
                    await fetchJson(
                        `${CLOUD_API_URL}/api/products`
                    );

                const list =
                    Array.isArray(products)
                        ? products
                        : [];

                if (list.length === 0) {
                    menuGrid.innerHTML = `
                        <p class="text-gray-500 text-sm italic col-span-2">
                            Quán đang hết món!
                        </p>
                    `;

                    return;
                }

                menuGrid.innerHTML =
                    list.map(product => {
                        const id =
                            escapeHtml(
                                product.id
                            );

                        const name =
                            escapeHtml(
                                product.name
                            );

                        const encodedName =
                            encodeURIComponent(
                                String(
                                    product.name ||
                                    ""
                                )
                            );

                        const price =
                            Number(
                                product.price
                            ) || 0;

                        const stock =
                            Number(
                                product.stock
                            ) || 0;

                        const soldOut =
                            stock <= 0;

                        const imageUrl =
                            product.imageUrl
                                ? escapeHtml(
                                    product.imageUrl
                                )
                                : "";

                        return `
                            <article class="cyber-panel rounded-xl overflow-hidden flex flex-col">
                                <div class="relative w-full h-40 bg-gray-950 flex items-center justify-center overflow-hidden">
                                    ${
                                        imageUrl
                                            ? `
                                                <img
                                                    src="${imageUrl}"
                                                    alt="${name}"
                                                    class="w-full h-full object-cover"
                                                    loading="lazy"
                                                    onerror="
                                                        this.classList.add('hidden');
                                                        this.nextElementSibling.classList.remove('hidden');
                                                    "
                                                >

                                                <div class="hidden text-gray-600 text-xs text-center">
                                                    <i class="fas fa-image text-3xl mb-2 block"></i>
                                                    KHÔNG TẢI ĐƯỢC ẢNH
                                                </div>
                                            `
                                            : `
                                                <div class="text-gray-600 text-xs text-center">
                                                    <i class="fas fa-image text-3xl mb-2 block"></i>
                                                    CHƯA CÓ ẢNH
                                                </div>
                                            `
                                    }

                                    <span class="absolute top-2 right-2 bg-black/75 border border-gray-700 px-2 py-1 rounded-lg text-[10px] ${
                                        soldOut
                                            ? "text-red-400"
                                            : "text-emerald-400"
                                    }">
                                        ${
                                            soldOut
                                                ? "HẾT HÀNG"
                                                : `Còn ${stock}`
                                        }
                                    </span>
                                </div>

                                <div class="p-4 flex-1 flex flex-col justify-between gap-3">
                                    <div>
                                        <h4 class="font-bold text-sm text-white">
                                            ${name}
                                        </h4>

                                        <p class="text-sm text-green-400 font-mono mt-1 font-bold">
                                            ${price.toLocaleString("vi-VN")}đ
                                        </p>
                                    </div>

                                    <button
                                        type="button"
                                        data-product-id="${id}"
                                        data-product-name="${encodedName}"
                                        data-product-price="${price}"
                                        onclick="
                                            addToCart(
                                                this.dataset.productId,
                                                decodeURIComponent(
                                                    this.dataset.productName
                                                ),
                                                Number(
                                                    this.dataset.productPrice
                                                )
                                            )
                                        "
                                        ${
                                            soldOut
                                                ? "disabled"
                                                : ""
                                        }
                                        class="${
                                            soldOut
                                                ? "bg-gray-800 text-gray-500 cursor-not-allowed"
                                                : "bg-cyan-600 hover:bg-cyan-500 text-white"
                                        } w-full text-xs font-bold px-3 py-2 rounded-lg transition"
                                    >
                                        ${
                                            soldOut
                                                ? "HẾT HÀNG"
                                                : "+ GIỎ"
                                        }
                                    </button>
                                </div>
                            </article>
                        `;
                    }).join("");
            } catch (error) {
                console.error(
                    "Lỗi tải thực đơn AWS:",
                    error
                );

                menuGrid.innerHTML = `
                    <p class="text-red-400 text-sm col-span-2">
                        ${escapeHtml(error.message)}
                    </p>
                `;
            }
        }

        window.addToCart = function (
            id,
            name,
            price
        ) {
            const existing =
                clientCart.find(
                    item => item.id === id
                );

            if (existing) {
                existing.quantity += 1;
            } else {
                clientCart.push({
                    id,
                    name,
                    price,
                    quantity: 1
                });
            }

            renderCart();
        };

        function renderCart() {
            const cartList =
                document.getElementById(
                    "cart-items"
                );

            const totalElement =
                document.getElementById(
                    "cart-total"
                );

            if (clientCart.length === 0) {
                cartList.innerHTML = `
                    <p class="text-gray-500 text-center py-4">
                        Giỏ đang trống
                    </p>
                `;

                totalElement.innerText =
                    "0đ";

                return;
            }

            let total = 0;

            cartList.innerHTML =
                clientCart.map(
                    (item, index) => {
                        const lineTotal =
                            Number(item.price) *
                            Number(item.quantity);

                        total += lineTotal;

                        return `
                            <div class="flex justify-between items-center bg-gray-900 p-2 rounded-lg border border-gray-800 gap-2">
                                <span class="text-white font-bold">
                                    ${escapeHtml(item.name)}

                                    <span class="text-cyan-400 ml-1">
                                        x${item.quantity}
                                    </span>
                                </span>

                                <div class="flex items-center gap-2">
                                    <span class="text-green-400 font-bold">
                                        ${lineTotal.toLocaleString("vi-VN")}đ
                                    </span>

                                    <button
                                        onclick="removeFromCart(${index})"
                                        class="text-red-500 hover:text-red-400 font-bold px-2"
                                    >
                                        X
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                ).join("");

            totalElement.innerText =
                `${total.toLocaleString("vi-VN")}đ`;
        }

        window.removeFromCart =
            function (index) {
                clientCart.splice(
                    index,
                    1
                );

                renderCart();
            };

        window.checkout =
            async function (type) {
                if (
                    clientCart.length === 0
                ) {
                    showToast(
                        "Giỏ hàng đang trống!",
                        "error"
                    );

                    return;
                }

                const totalAmount =
                    clientCart.reduce(
                        (sum, item) =>
                            sum +
                            Number(item.price) *
                            Number(item.quantity),
                        0
                    );

                const itemsSummary =
                    clientCart
                        .map(
                            item =>
                                `${item.quantity}x ${item.name}`
                        )
                        .join(", ");

                if (type !== "momo") {
                    await submitOrder(
                        "Trừ tiền máy",
                        totalAmount,
                        itemsSummary
                    );

                    return;
                }

                document.getElementById(
                    "momo-amount"
                ).innerText =
                    `${totalAmount.toLocaleString("vi-VN")}đ`;

                document.getElementById(
                    "momo-modal"
                ).classList.remove(
                    "hidden"
                );

                try {
                    const data =
                        await fetchJson(
                            `${SERVER_URL}/create-payment-link`,
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type":
                                        "application/json; charset=utf-8"
                                },
                                body: JSON.stringify({
                                    amount:
                                        totalAmount,
                                    username:
                                        normalizedUser,
                                    type: "food"
                                })
                            }
                        );

                    if (!data.url) {
                        throw new Error(
                            "Không nhận được link thanh toán"
                        );
                    }

                    window.open(
                        data.url,
                        "_blank"
                    );

                    foodPaymentCheckInterval =
                        setInterval(
                            async () => {
                                try {
                                    const status =
                                        await fetchJson(
                                            `${SERVER_URL}/api/check-food-payment/${encodeURIComponent(normalizedUser)}`
                                        );

                                    if (
                                        status.paid
                                    ) {
                                        clearInterval(
                                            foodPaymentCheckInterval
                                        );

                                        foodPaymentCheckInterval =
                                            null;

                                        document.getElementById(
                                            "momo-modal"
                                        ).classList.add(
                                            "hidden"
                                        );

                                        await submitOrder(
                                            "PayOS",
                                            totalAmount,
                                            itemsSummary
                                        );
                                    }
                                } catch (
                                    error
                                ) {
                                    console.error(
                                        "Lỗi kiểm tra thanh toán:",
                                        error
                                    );
                                }
                            },
                            2000
                        );
                } catch (error) {
                    document.getElementById(
                        "momo-modal"
                    ).classList.add(
                        "hidden"
                    );

                    showToast(
                        error.message,
                        "error"
                    );
                }
            };

        window.cancelFoodPayment =
            function () {
                if (
                    foodPaymentCheckInterval
                ) {
                    clearInterval(
                        foodPaymentCheckInterval
                    );

                    foodPaymentCheckInterval =
                        null;
                }

                document.getElementById(
                    "momo-modal"
                ).classList.add(
                    "hidden"
                );
            };

        async function submitOrder(
            paymentMethod,
            totalAmount,
            itemsSummary
        ) {
            try {
                const orderBody = {
                    id: createOrderId(),
                    machineName: normalizedUser,
                    itemsSummary,
                    totalAmount,
                    paymentMethod,
                    status: "pending",
                    time:
                        new Date()
                            .toLocaleTimeString("vi-VN")
                };

                await fetchJson(
                    `${CLOUD_API_URL}/api/orders`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify(orderBody)
                    }
                );

                clientCart = [];

                renderCart();

                showToast(
                    "Đã gửi đơn hàng lên AWS!",
                    "success"
                );

                await loadMyOrders();
            } catch (error) {
                console.error(
                    "Lỗi gửi đơn hàng lên AWS:",
                    error
                );

                showToast(
                    error.message,
                    "error"
                );
            }
        }

        async function loadMyOrders() {
            const box =
                document.getElementById(
                    "client-order-status"
                );

            try {
                const orders =
                    await fetchJson(
                        `${CLOUD_API_URL}/api/orders`
                    );

                const myOrders =
                    (
                        Array.isArray(orders)
                            ? orders
                            : []
                    )
                        .filter(order => {
                            const orderMachine =
                                String(order.machineName || "")
                                    .toLowerCase()
                                    .trim();

                            return orderMachine === normalizedUser;
                        })
                        .sort((a, b) => {
                            return String(
                                b.createdAt || ""
                            ).localeCompare(
                                String(a.createdAt || "")
                            );
                        });

                if (myOrders.length === 0) {
                    box.innerHTML =
                        "Chưa đặt món nào.";

                    return;
                }

                box.innerHTML =
                    myOrders.map(order => {
                        const totalAmount =
                            Number(order.totalAmount) || 0;

                        const status =
                            String(order.status || "pending")
                                .toLowerCase()
                                .trim();

                        const statusText =
                            status === "pending"
                                ? "ĐANG CHUẨN BỊ"
                                : status === "cancelled"
                                    ? "ĐÃ HỦY"
                                    : "ĐÃ GIAO";

                        const statusClass =
                            status === "pending"
                                ? "text-orange-400"
                                : status === "cancelled"
                                    ? "text-red-400"
                                    : "text-green-400";

                        return `
                            <div class="flex justify-between border-b border-gray-800 pb-2 mb-2 gap-2">
                                <div>
                                    <p class="text-white text-[11px] font-bold mb-1">
                                        ${escapeHtml(order.itemsSummary)}
                                    </p>

                                    <p class="text-[10px] text-gray-500">
                                        Tổng:
                                        ${totalAmount.toLocaleString("vi-VN")}đ
                                    </p>

                                    <p class="text-[10px] text-gray-500">
                                        Máy:
                                        ${escapeHtml(order.machineName)}
                                    </p>
                                </div>

                                <span class="${statusClass} font-bold text-[10px] mt-1 whitespace-nowrap">
                                    ${statusText}
                                </span>
                            </div>
                        `;
                    }).join("");
            } catch (error) {
                console.error(
                    "Lỗi tải đơn hàng AWS:",
                    error
                );

                box.innerHTML = `
                    <span class="text-red-400">
                        Không tải được đơn hàng từ AWS.
                    </span>
                `;
            }
        }

        window.toggleChat =
            function () {
                const chatBox =
                    document.getElementById(
                        "chat-box"
                    );

                chatBox.classList.toggle(
                    "hidden"
                );

                document.getElementById(
                    "chat-badge"
                ).classList.add(
                    "hidden"
                );

                document.getElementById(
                    "chat-badge-dot"
                ).classList.add(
                    "hidden"
                );

                fetchJson(
                    `${SERVER_URL}/api/chat/read`,
                    {
                        method: "PUT",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify({
                            machine:
                                normalizedUser,
                            reader:
                                "client"
                        })
                    }
                ).catch(
                    error =>
                        console.error(
                            "Lỗi đánh dấu chat:",
                            error
                        )
                );
            };

        window.sendMessage =
            async function () {
                const input =
                    document.getElementById(
                        "chat-input"
                    );

                const message =
                    input.value.trim();

                if (!message) {
                    return;
                }

                try {
                    await fetchJson(
                        `${SERVER_URL}/api/chat`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json; charset=utf-8"
                            },
                            body:
                                JSON.stringify({
                                    machine:
                                        normalizedUser,
                                    from:
                                        normalizedUser,
                                    msg:
                                        message,
                                    time:
                                        new Date()
                                            .toLocaleTimeString(
                                                "vi-VN"
                                            ),
                                    read:
                                        false
                                })
                        }
                    );

                    input.value = "";

                    await renderChat();
                } catch (error) {
                    showToast(
                        error.message,
                        "error"
                    );
                }
            };

        async function renderChat() {
            const box =
                document.getElementById(
                    "chat-messages"
                );

            try {
                const chats =
                    await fetchJson(
                        `${SERVER_URL}/api/chat`
                    );

                const myChats =
                    (
                        Array.isArray(chats)
                            ? chats
                            : []
                    ).filter(chat => {
                        const machine =
                            String(chat.machine || "")
                                .toLowerCase()
                                .trim();

                        return machine === normalizedUser;
                    });

                box.innerHTML =
                    myChats.map(
                        chat => {
                            const mine =
                                chat.from ===
                                normalizedUser;

                            return `
                                <div class="${
                                    mine
                                        ? "text-right"
                                        : "text-left"
                                }">
                                    <p class="inline-block ${
                                        mine
                                            ? "bg-cyan-900 text-cyan-200"
                                            : "bg-gray-800 text-gray-200"
                                    } p-2 rounded text-xs">
                                        ${
                                            chat.from ===
                                            "admin"
                                                ? '<strong class="text-yellow-400">Admin: </strong>'
                                                : ""
                                        }

                                        ${escapeHtml(chat.msg)}
                                    </p>

                                    <p class="text-[9px] text-gray-500">
                                        ${escapeHtml(chat.time)}
                                    </p>
                                </div>
                            `;
                        }
                    ).join("");

                box.scrollTop =
                    box.scrollHeight;

                const unread =
                    myChats.some(
                        chat =>
                            chat.from ===
                            "admin" &&
                            !chat.read
                    );

                const chatHidden =
                    document.getElementById(
                        "chat-box"
                    ).classList.contains(
                        "hidden"
                    );

                if (
                    unread &&
                    chatHidden
                ) {
                    document.getElementById(
                        "chat-badge"
                    ).classList.remove(
                        "hidden"
                    );

                    document.getElementById(
                        "chat-badge-dot"
                    ).classList.remove(
                        "hidden"
                    );
                }
            } catch (error) {
                console.error(
                    "Lỗi tải chat:",
                    error
                );
            }
        }

        async function syncTimeWithServer() {
            try {
                const serverUsers =
                    await fetchJson(
                        `${SERVER_URL}/api/sync-devices`
                    );

                const myData =
                    (
                        Array.isArray(
                            serverUsers
                        )
                            ? serverUsers
                            : []
                    ).find(item => {
                        const username =
                            String(item.username || "")
                                .toLowerCase()
                                .trim();

                        return username === normalizedUser;
                    });

                if (!myData) {
                    return;
                }

                document.getElementById(
                    "client-balance"
                ).innerText =
                    myData.time_remaining ||
                    "00:00:00";

                if (
                    myData.time_remaining ===
                        "00:00:00" &&
                    myData.status ===
                        "locked"
                ) {
                    showToast(
                        "Hết thời gian!",
                        "error"
                    );

                    logout();
                }
            } catch (error) {
                console.error(
                    "Lỗi đồng bộ thời gian:",
                    error
                );
            }
        }

        window.openDepositMomo =
            async function (amount) {
                try {
                    const data =
                        await fetchJson(
                            `${SERVER_URL}/create-payment-link`,
                            {
                                method:
                                    "POST",
                                headers: {
                                    "Content-Type":
                                        "application/json; charset=utf-8"
                                },
                                body:
                                    JSON.stringify({
                                        amount,
                                        username:
                                            normalizedUser,
                                        type:
                                            "topup"
                                    })
                            }
                        );

                    if (!data.url) {
                        throw new Error(
                            "Không nhận được link thanh toán"
                        );
                    }

                    window.location.href =
                        data.url;
                } catch (error) {
                    showToast(
                        error.message,
                        "error"
                    );
                }
            };

        function captureAndUploadScreen() {
            if (
                typeof html2canvas ===
                    "undefined" ||
                !user
            ) {
                setTimeout(
                    captureAndUploadScreen,
                    3000
                );

                return;
            }

            let indicator =
                document.getElementById(
                    "debug-dot"
                );

            if (!indicator) {
                indicator =
                    document.createElement(
                        "div"
                    );

                indicator.id =
                    "debug-dot";

                indicator.style.cssText =
                    "position:fixed;top:10px;left:10px;width:14px;height:14px;background:yellow;border-radius:50%;z-index:999999;border:2px solid white";

                document.body.appendChild(
                    indicator
                );
            }

            indicator.style.background =
                "orange";

            html2canvas(
                document.body,
                {
                    logging: false,
                    useCORS: true,
                    allowTaint: true,
                    scale: 0.8,
                    backgroundColor:
                        "#030712"
                }
            )
                .then(canvas => {
                    const base64Image =
                        canvas.toDataURL(
                            "image/jpeg",
                            0.8
                        );

                    return fetchJson(
                        `${SERVER_URL}/api/client-upload-screen`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json"
                            },
                            body:
                                JSON.stringify({
                                    username:
                                        normalizedUser,
                                    image:
                                        base64Image
                                })
                        }
                    );
                })
                .then(() => {
                    indicator.style.background =
                        "green";

                    setTimeout(
                        captureAndUploadScreen,
                        3000
                    );
                })
                .catch(error => {
                    console.error(
                        "Lỗi gửi ảnh màn hình:",
                        error
                    );

                    indicator.style.background =
                        "red";

                    setTimeout(
                        captureAndUploadScreen,
                        5000
                    );
                });
        }

        document.addEventListener(
            "DOMContentLoaded",
            async () => {
                renderCart();

                await Promise.allSettled([
                    loadMenuFromAdmin(),
                    loadMyOrders(),
                    renderChat(),
                    syncTimeWithServer()
                ]);

                setInterval(
                    syncTimeWithServer,
                    1000
                );

                setInterval(
                    loadMyOrders,
                    2000
                );

                setInterval(
                    renderChat,
                    2000
                );

                setInterval(
                    loadMenuFromAdmin,
                    60000
                );
            }
        );

        window.addEventListener(
            "load",
            () => {
                setTimeout(
                    captureAndUploadScreen,
                    1500
                );
            }
        );
    </script>
    <script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    function getCurrentUsername() {
        const direct =
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username");

        if (direct) {
            return String(direct).trim().toLowerCase();
        }

        const keys = ["cybernet_user", "currentUser"];

        for (const key of keys) {
            try {
                const raw =
                    localStorage.getItem(key) ||
                    sessionStorage.getItem(key);

                if (!raw) continue;

                const user = JSON.parse(raw);
                const username = user.username || user.machineName;

                if (username) {
                    return String(username).trim().toLowerCase();
                }
            } catch {}
        }

        return "";
    }

    function normalizeMachine(machine) {
        const username = String(machine.username || machine.machineName || "").toLowerCase();
        const machineName = machine.machineName || username.toUpperCase();

        return {
            ...machine,
            username,
            machineName,
            role: machine.role || "client",
            balance: Number(machine.balance || machine.money || 0),
            money: Number(machine.money || machine.balance || 0),
            remainingSeconds: Number(machine.remainingSeconds || 0)
        };
    }

    function saveMachineToLocal(machine) {
        const m = normalizeMachine(machine);

        localStorage.setItem("session_user", m.username);
        sessionStorage.setItem("session_user", m.username);

        localStorage.setItem("username", m.username);
        sessionStorage.setItem("username", m.username);

        localStorage.setItem("machineName", m.machineName);
        sessionStorage.setItem("machineName", m.machineName);

        localStorage.setItem("role", m.role);
        sessionStorage.setItem("role", m.role);

        localStorage.setItem("cybernet_user", JSON.stringify(m));
        sessionStorage.setItem("cybernet_user", JSON.stringify(m));

        localStorage.setItem("currentUser", JSON.stringify(m));
        sessionStorage.setItem("currentUser", JSON.stringify(m));

        let db = JSON.parse(localStorage.getItem("cyber_db")) || {
            revenue: 0,
            menu: [],
            orders: [],
            users: {}
        };

        db.users = db.users || {};
        db.users[m.username] = {
            balance: m.balance,
            money: m.money,
            role: m.role,
            machineName: m.machineName,
            remainingSeconds: m.remainingSeconds
        };

        localStorage.setItem("cyber_db", JSON.stringify(db));

        return m;
    }

    function formatMoney(value) {
        return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    function formatTime(seconds) {
        const total = Number(seconds || 0);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;

        if (h > 0) {
            return `${h} giờ ${m} phút`;
        }

        if (m > 0) {
            return `${m} phút ${s} giây`;
        }

        return `${s} giây`;
    }

    function updateElementText(selectors, value) {
        selectors.forEach(selector => {
            const el = document.querySelector(selector);
            if (el) {
                el.innerText = value;
            }
        });
    }

    function renderMachine(machine) {
        const m = normalizeMachine(machine);

        updateElementText([
            "#machine-name",
            "#client-machine-name",
            "#current-machine",
            "#machineName",
            "[data-machine-name]"
        ], m.machineName);

        updateElementText([
            "#balance",
            "#client-balance",
            "#user-balance",
            "#money",
            "#user-money",
            "[data-balance]"
        ], formatMoney(m.balance));

        updateElementText([
            "#remaining-time",
            "#client-time",
            "#time-left",
            "#remainingTime",
            "[data-remaining-time]"
        ], formatTime(m.remainingSeconds));

        console.log("CyberNet AWS machine synced:", m);
    }

    async function loadMyMachineFromAws() {
        const username = getCurrentUsername();

        if (!username) {
            console.warn("CyberNet: không tìm thấy session_user");
            return;
        }

        const res = await fetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}`);
        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Không tải được thông tin máy từ AWS");
        }

        const machine = saveMachineToLocal(data.machine);
        renderMachine(machine);
    }

    async function startAwsMachineSync() {
        try {
            await loadMyMachineFromAws();
        } catch (err) {
            console.warn("CyberNet AWS machine sync failed:", err.message);
        }

        setInterval(async () => {
            try {
                await loadMyMachineFromAws();
            } catch (err) {
                console.warn("CyberNet AWS machine sync failed:", err.message);
            }
        }, 15000);
    }

    document.addEventListener("DOMContentLoaded", startAwsMachineSync);
})();
</script>
