<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập CyberNet</title>

    <!-- Config cloud/local API -->
    <script src="config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: system-ui, sans-serif; }
        .cyber-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="cyber-panel p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <h2 id="auth-title" class="text-cyan-400 text-3xl font-black text-center mb-6 tracking-wider">CYBER ZONE</h2>

        <div class="space-y-4">
            <input id="auth-user" type="text" placeholder="Tên tài khoản..." class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl text-white focus:outline-none focus:border-cyan-500">
            <input id="auth-pass" type="password" placeholder="Mật khẩu..." class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl text-white focus:outline-none focus:border-cyan-500">

            <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-cyan-600 hover:bg-cyan-500 font-bold py-3 rounded-xl transition">
                ĐĂNG NHẬP
            </button>

            <div class="text-center mt-4">
                <button onclick="toggleAuthMode()" id="btn-auth-toggle" class="text-xs text-gray-400 hover:text-cyan-400 underline">
                    Chưa có tài khoản? Đăng ký ngay
                </button>
            </div>
        </div>

        <div class="mt-6 p-3 bg-gray-950 rounded-xl border border-gray-800 text-[11px] text-gray-500 space-y-1">
            <p>💡 <b>Nếu cần hỗ trợ liên hệ</b> <span class="text-cyan-400">093980327 / 0857993603</span></p>
            <p>💡 Đăng nhập ưu tiên qua AWS. Nếu AWS lỗi sẽ thử lại bằng Local Edge Server.</p>
        </div>
    </div>

    <script>
        const CLOUD_API_URL =
            window.CYBERNET_CONFIG?.CLOUD_API_URL ||
            "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

        const SERVER_URL =
            window.CYBERNET_CONFIG?.LOCAL_API_URL ||
            "http://127.0.0.1:3000";

        let isRegisterMode = false;

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "ĐĂNG KÝ HỘI VIÊN" : "CYBER ZONE";
            document.getElementById('btn-auth-main').innerText = isRegisterMode ? "TẠO TÀI KHOẢN MỚI" : "ĐĂNG NHẬP";
            document.getElementById('btn-auth-toggle').innerText = isRegisterMode ? "Đã có tài khoản? Đăng nhập" : "Chưa có tài khoản? Đăng ký ngay";
        }

        function normalizeUser(rawUser) {
            const user = rawUser || {};
            const username = String(user.username || user.machineName || "").trim().toLowerCase();
            const role = user.role || (username === "admin" ? "admin" : "client");
            const machineName = user.machineName || (username === "admin" ? "ADMIN" : username.toUpperCase());

            return {
                ...user,
                username,
                role,
                machineName,
                money: Number(user.money ?? user.balance ?? 0),
                balance: Number(user.balance ?? user.money ?? 0),
                remainingSeconds: Number(user.remainingSeconds ?? 0)
            };
        }

        function seedLocalCompatibility(user) {
            localStorage.setItem('session_user', user.username);

            localStorage.setItem("cybernet_user", JSON.stringify(user));
            sessionStorage.setItem("cybernet_user", JSON.stringify(user));

            localStorage.setItem("currentUser", JSON.stringify(user));
            sessionStorage.setItem("currentUser", JSON.stringify(user));

            localStorage.setItem("username", user.username);
            sessionStorage.setItem("username", user.username);

            localStorage.setItem("machineName", user.machineName);
            sessionStorage.setItem("machineName", user.machineName);

            localStorage.setItem("role", user.role);
            sessionStorage.setItem("role", user.role);

            // Mồi database ảo cục bộ để tránh lỗi code cũ đọc menu/orders/users.
            let localDB = JSON.parse(localStorage.getItem('cyber_db')) || { revenue: 0, menu: [], orders: [], users: {} };

            if (!localDB.menu || localDB.menu.length === 0) {
                localDB.menu = [
                    { id: "mi_tom", name: "Mì tôm bẻ làm bốn", price: 15000, stock: 20 },
                    { id: "sting", name: "Sting dâu lạnh", price: 12000, stock: 15 }
                ];
            }

            localDB.users = localDB.users || {};
            localDB.users[user.username] = {
                balance: user.balance ?? user.money ?? 0,
                role: user.role,
                machineName: user.machineName
            };

            localStorage.setItem('cyber_db', JSON.stringify(localDB));
        }

        async function loginWithAws(username, password) {
            const res = await fetch(`${CLOUD_API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok || !data.success) {
                throw new Error(data.message || "AWS login failed");
            }

            return normalizeUser(data.user || data.machine || data);
        }

        async function loginWithLocal(username, password) {
            const res = await fetch(`${SERVER_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok || data.error || data.success === false) {
                throw new Error(data.error || data.message || "Local login failed");
            }

            return normalizeUser({
                username: data.username || username,
                role: data.role,
                money: data.money,
                balance: data.money,
                machineName: data.machineName
            });
        }

        async function registerWithLocal(username, password) {
            const res = await fetch(`${SERVER_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok || data.error || data.success === false) {
                throw new Error(data.error || data.message || "Đăng ký thất bại");
            }

            return data;
        }

        async function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();

            if (!u || !p) {
                alert("Vui lòng điền đủ thông tin nha fen!");
                return;
            }

            const btn = document.getElementById("btn-auth-main");
            const oldText = btn.innerText;
            btn.disabled = true;
            btn.innerText = isRegisterMode ? "ĐANG TẠO..." : "ĐANG ĐĂNG NHẬP...";

            try {
                if (isRegisterMode) {
                    // Hiện tại đăng ký vẫn đi qua Local Edge Server.
                    // Bước sau mình sẽ đưa /api/register lên AWS.
                    const data = await registerWithLocal(u, p);
                    alert(data.msg || data.message || "Đăng ký thành công");
                    toggleAuthMode();
                    return;
                }

                let user;

                try {
                    // Ưu tiên AWS trước.
                    user = await loginWithAws(u, p);
                    console.log("Login AWS thành công");
                } catch (awsError) {
                    console.warn("AWS login lỗi, thử Local Edge Server:", awsError.message);
                    user = await loginWithLocal(u, p);
                    console.log("Login local thành công");
                }

                seedLocalCompatibility(user);

                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'client.html';
                }
            } catch (err) {
                console.error(err);
                alert(isRegisterMode ? "Lỗi kết nối Server không thể đăng ký!" : "Sai tài khoản hoặc mật khẩu!");
            } finally {
                btn.disabled = false;
                btn.innerText = oldText;
            }
        }
    </script>
</body>
</html>
