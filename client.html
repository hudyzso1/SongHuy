<!DOCTYPE html>
<html lang="vi">
<script src="config.js"></script> 
<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    const originalFetch = window.fetch.bind(window);

    window.fetch = function (input, init) {
        let url = "";

        if (typeof input === "string") {
            url = input;
        } else if (input && input.url) {
            url = input.url;
        }

        if (url.includes("/api/chat")) {
            const newUrl = CLOUD_API_URL + "/api/chat";

            console.log("CyberNet chat redirected to AWS:", newUrl);

            if (typeof input === "string") {
                return originalFetch(newUrl, init);
            }

            const newRequest = new Request(newUrl, input);
            return originalFetch(newRequest, init);
        }

        return originalFetch(input, init);
    };
})();
</script>

    <script src="./config.js"></script>

    <script>
        "use strict";

        const SERVER_URL =
            window.CYBERNET_CONFIG?.LOCAL_API_URL ||
            "http://127.0.0.1:3000";

        const CLOUD_API_URL =
            window.CYBERNET_CONFIG?.CLOUD_API_URL ||
            "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

        const user =
            localStorage.getItem("session_user");

        if (!user) {
            window.location.href =
                "index.html";
        }

        const normalizedUser =
            String(user || "")
                .toLowerCase()
                .trim();

        document.getElementById(
            "client-name"
        ).innerText =
            String(user || "").toUpperCase();

        let clientCart = [];
        let foodPaymentCheckInterval = null;

        function showToast(
            text,
            type = "success"
        ) {
            const color =
                type === "error"
                    ? "#ef4444"
                    : type === "warning"
                        ? "#f59e0b"
                        : "#06b6d4";

            Toastify({
                text,
                duration: 3000,
                gravity: "top",
                position: "right",
                style: {
                    background: color,
                    color: "#fff",
                    fontWeight: "bold",
                    borderRadius: "10px"
                }
            }).showToast();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchJson(
            url,
            options = {}
        ) {
            const response =
                await fetch(url, options);

            let data = null;

            try {
                data = await response.json();
            } catch {
                data = null;
            }

            if (!response.ok) {
                throw new Error(
                    data?.error ||
                    data?.message ||
                    `HTTP ${response.status}`
                );
            }

            return data;
        }

        function createOrderId() {
            if (
                window.crypto &&
                typeof window.crypto.randomUUID === "function"
            ) {
                return window.crypto.randomUUID();
            }

            return `${Date.now()}-${Math.random()
                .toString(16)
                .slice(2)}`;
        }

        window.logout = function () {
            localStorage.removeItem(
                "session_user"
            );

            window.location.href =
                "index.html";
        };

        async function loadMenuFromAdmin() {
            const menuGrid =
                document.getElementById(
                    "client-menu-grid"
                );

            menuGrid.innerHTML = `
                <p class="text-gray-500 text-sm italic col-span-2">
                    Đang tải thực đơn từ AWS...
                </p>
            `;

            try {
                const products =
                    await fetchJson(
                        `${CLOUD_API_URL}/api/products`
                    );

                const list =
                    Array.isArray(products)
                        ? products
                        : [];

                if (list.length === 0) {
                    menuGrid.innerHTML = `
                        <p class="text-gray-500 text-sm italic col-span-2">
                            Quán đang hết món!
                        </p>
                    `;

                    return;
                }

                menuGrid.innerHTML =
                    list.map(product => {
                        const id =
                            escapeHtml(
                                product.id
                            );

                        const name =
                            escapeHtml(
                                product.name
                            );

                        const encodedName =
                            encodeURIComponent(
                                String(
                                    product.name ||
                                    ""
                                )
                            );

                        const price =
                            Number(
                                product.price
                            ) || 0;

                        const stock =
                            Number(
                                product.stock
                            ) || 0;

                        const soldOut =
                            stock <= 0;

                        const imageUrl =
                            product.imageUrl
                                ? escapeHtml(
                                    product.imageUrl
                                )
                                : "";

                        return `
                            <article class="cyber-panel rounded-xl overflow-hidden flex flex-col">
                                <div class="relative w-full h-40 bg-gray-950 flex items-center justify-center overflow-hidden">
                                    ${
                                        imageUrl
                                            ? `
                                                <img
                                                    src="${imageUrl}"
                                                    alt="${name}"
                                                    class="w-full h-full object-cover"
                                                    loading="lazy"
                                                    onerror="
                                                        this.classList.add('hidden');
                                                        this.nextElementSibling.classList.remove('hidden');
                                                    "
                                                >

                                                <div class="hidden text-gray-600 text-xs text-center">
                                                    <i class="fas fa-image text-3xl mb-2 block"></i>
                                                    KHÔNG TẢI ĐƯỢC ẢNH
                                                </div>
                                            `
                                            : `
                                                <div class="text-gray-600 text-xs text-center">
                                                    <i class="fas fa-image text-3xl mb-2 block"></i>
                                                    CHƯA CÓ ẢNH
                                                </div>
                                            `
                                    }

                                    <span class="absolute top-2 right-2 bg-black/75 border border-gray-700 px-2 py-1 rounded-lg text-[10px] ${
                                        soldOut
                                            ? "text-red-400"
                                            : "text-emerald-400"
                                    }">
                                        ${
                                            soldOut
                                                ? "HẾT HÀNG"
                                                : `Còn ${stock}`
                                        }
                                    </span>
                                </div>

                                <div class="p-4 flex-1 flex flex-col justify-between gap-3">
                                    <div>
                                        <h4 class="font-bold text-sm text-white">
                                            ${name}
                                        </h4>

                                        <p class="text-sm text-green-400 font-mono mt-1 font-bold">
                                            ${price.toLocaleString("vi-VN")}đ
                                        </p>
                                    </div>

                                    <button
                                        type="button"
                                        data-product-id="${id}"
                                        data-product-name="${encodedName}"
                                        data-product-price="${price}"
                                        onclick="
                                            addToCart(
                                                this.dataset.productId,
                                                decodeURIComponent(
                                                    this.dataset.productName
                                                ),
                                                Number(
                                                    this.dataset.productPrice
                                                )
                                            )
                                        "
                                        ${
                                            soldOut
                                                ? "disabled"
                                                : ""
                                        }
                                        class="${
                                            soldOut
                                                ? "bg-gray-800 text-gray-500 cursor-not-allowed"
                                                : "bg-cyan-600 hover:bg-cyan-500 text-white"
                                        } w-full text-xs font-bold px-3 py-2 rounded-lg transition"
                                    >
                                        ${
                                            soldOut
                                                ? "HẾT HÀNG"
                                                : "+ GIỎ"
                                        }
                                    </button>
                                </div>
                            </article>
                        `;
                    }).join("");
            } catch (error) {
                console.error(
                    "Lỗi tải thực đơn AWS:",
                    error
                );

                menuGrid.innerHTML = `
                    <p class="text-red-400 text-sm col-span-2">
                        ${escapeHtml(error.message)}
                    </p>
                `;
            }
        }

        window.addToCart = function (
            id,
            name,
            price
        ) {
            const existing =
                clientCart.find(
                    item => item.id === id
                );

            if (existing) {
                existing.quantity += 1;
            } else {
                clientCart.push({
                    id,
                    name,
                    price,
                    quantity: 1
                });
            }

            renderCart();
        };

        function renderCart() {
            const cartList =
                document.getElementById(
                    "cart-items"
                );

            const totalElement =
                document.getElementById(
                    "cart-total"
                );

            if (clientCart.length === 0) {
                cartList.innerHTML = `
                    <p class="text-gray-500 text-center py-4">
                        Giỏ đang trống
                    </p>
                `;

                totalElement.innerText =
                    "0đ";

                return;
            }

            let total = 0;

            cartList.innerHTML =
                clientCart.map(
                    (item, index) => {
                        const lineTotal =
                            Number(item.price) *
                            Number(item.quantity);

                        total += lineTotal;

                        return `
                            <div class="flex justify-between items-center bg-gray-900 p-2 rounded-lg border border-gray-800 gap-2">
                                <span class="text-white font-bold">
                                    ${escapeHtml(item.name)}

                                    <span class="text-cyan-400 ml-1">
                                        x${item.quantity}
                                    </span>
                                </span>

                                <div class="flex items-center gap-2">
                                    <span class="text-green-400 font-bold">
                                        ${lineTotal.toLocaleString("vi-VN")}đ
                                    </span>

                                    <button
                                        onclick="removeFromCart(${index})"
                                        class="text-red-500 hover:text-red-400 font-bold px-2"
                                    >
                                        X
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                ).join("");

            totalElement.innerText =
                `${total.toLocaleString("vi-VN")}đ`;
        }

        window.removeFromCart =
            function (index) {
                clientCart.splice(
                    index,
                    1
                );

                renderCart();
            };

        window.checkout =
            async function (type) {
                if (
                    clientCart.length === 0
                ) {
                    showToast(
                        "Giỏ hàng đang trống!",
                        "error"
                    );

                    return;
                }

                const totalAmount =
                    clientCart.reduce(
                        (sum, item) =>
                            sum +
                            Number(item.price) *
                            Number(item.quantity),
                        0
                    );

                const itemsSummary =
                    clientCart
                        .map(
                            item =>
                                `${item.quantity}x ${item.name}`
                        )
                        .join(", ");

                if (type !== "momo") {
                    await submitOrder(
                        "Trừ tiền máy",
                        totalAmount,
                        itemsSummary
                    );

                    return;
                }

                document.getElementById(
                    "momo-amount"
                ).innerText =
                    `${totalAmount.toLocaleString("vi-VN")}đ`;

                document.getElementById(
                    "momo-modal"
                ).classList.remove(
                    "hidden"
                );

                try {
                    const data =
                        await fetchJson(
                            `${SERVER_URL}/create-payment-link`,
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type":
                                        "application/json; charset=utf-8"
                                },
                                body: JSON.stringify({
                                    amount:
                                        totalAmount,
                                    username:
                                        normalizedUser,
                                    type: "food"
                                })
                            }
                        );

                    if (!data.url) {
                        throw new Error(
                            "Không nhận được link thanh toán"
                        );
                    }

                    window.open(
                        data.url,
                        "_blank"
                    );

                    foodPaymentCheckInterval =
                        setInterval(
                            async () => {
                                try {
                                    const status =
                                        await fetchJson(
                                            `${SERVER_URL}/api/check-food-payment/${encodeURIComponent(normalizedUser)}`
                                        );

                                    if (
                                        status.paid
                                    ) {
                                        clearInterval(
                                            foodPaymentCheckInterval
                                        );

                                        foodPaymentCheckInterval =
                                            null;

                                        document.getElementById(
                                            "momo-modal"
                                        ).classList.add(
                                            "hidden"
                                        );

                                        await submitOrder(
                                            "PayOS",
                                            totalAmount,
                                            itemsSummary
                                        );
                                    }
                                } catch (
                                    error
                                ) {
                                    console.error(
                                        "Lỗi kiểm tra thanh toán:",
                                        error
                                    );
                                }
                            },
                            2000
                        );
                } catch (error) {
                    document.getElementById(
                        "momo-modal"
                    ).classList.add(
                        "hidden"
                    );

                    showToast(
                        error.message,
                        "error"
                    );
                }
            };

        window.cancelFoodPayment =
            function () {
                if (
                    foodPaymentCheckInterval
                ) {
                    clearInterval(
                        foodPaymentCheckInterval
                    );

                    foodPaymentCheckInterval =
                        null;
                }

                document.getElementById(
                    "momo-modal"
                ).classList.add(
                    "hidden"
                );
            };

        async function submitOrder(
            paymentMethod,
            totalAmount,
            itemsSummary
        ) {
            try {
                const orderBody = {
                    id: createOrderId(),
                    machineName: normalizedUser,
                    itemsSummary,
                    totalAmount,
                    paymentMethod,
                    status: "pending",
                    time:
                        new Date()
                            .toLocaleTimeString("vi-VN")
                };

                await fetchJson(
                    `${CLOUD_API_URL}/api/orders`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        },
                        body: JSON.stringify(orderBody)
                    }
                );

                clientCart = [];

                renderCart();

                showToast(
                    "Đã gửi đơn hàng lên AWS!",
                    "success"
                );

                await loadMyOrders();
            } catch (error) {
                console.error(
                    "Lỗi gửi đơn hàng lên AWS:",
                    error
                );

                showToast(
                    error.message,
                    "error"
                );
            }
        }

        async function loadMyOrders() {
            const box =
                document.getElementById(
                    "client-order-status"
                );

            try {
                const orders =
                    await fetchJson(
                        `${CLOUD_API_URL}/api/orders`
                    );

                const myOrders =
                    (
                        Array.isArray(orders)
                            ? orders
                            : []
                    )
                        .filter(order => {
                            const orderMachine =
                                String(order.machineName || "")
                                    .toLowerCase()
                                    .trim();

                            return orderMachine === normalizedUser;
                        })
                        .sort((a, b) => {
                            return String(
                                b.createdAt || ""
                            ).localeCompare(
                                String(a.createdAt || "")
                            );
                        });

                if (myOrders.length === 0) {
                    box.innerHTML =
                        "Chưa đặt món nào.";

                    return;
                }

                box.innerHTML =
                    myOrders.map(order => {
                        const totalAmount =
                            Number(order.totalAmount) || 0;

                        const status =
                            String(order.status || "pending")
                                .toLowerCase()
                                .trim();

                        const statusText =
                            status === "pending"
                                ? "ĐANG CHUẨN BỊ"
                                : status === "cancelled"
                                    ? "ĐÃ HỦY"

                    await fetchJson(
                        `https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com/api/chat`
                    );

                const myChats =
                    (
                        Array.isArray(chats)
                            ? chats
                            : []

                        const machine =
                            String(chat.machine || "")
                                .toLowerCase()
                                .trim();

                        return machine === normalizedUser;
                    });

                box.innerHTML =

                        chat => {

                                <div class="${

                                        : "text-left"

                        "chat-box"

                        "chat-badge-dot"

        function captureAndUploadScreen() {

            ) {

                    captureAndUploadScreen,

                );

                return;

            let indicator =
                document.getElementById(
                    "debug-dot"
                );

            if (!indicator) {
                indicator =

                    );

                indicator.id =

                indicator.style.cssText =

                document.body.appendChild(

            }

            indicator.style.background =

            html2canvas(
                document.body,

            )

        document.addEventListener(

    <script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    function getCurrentUsername() {
        const direct =
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username");

        if (direct) {
            return String(direct).trim().toLowerCase();
        }

        const keys = ["cybernet_user", "currentUser"];

        for (const key of keys) {
            try {
                const raw =
                    localStorage.getItem(key) ||
                    sessionStorage.getItem(key);

                if (!raw) continue;

                const user = JSON.parse(raw);
                const username = user.username || user.machineName;

                if (username) {
                    return String(username).trim().toLowerCase();
                }
            } catch {}
        }

        return "";
    }

    function normalizeMachine(machine) {
        const username = String(machine.username || machine.machineName || "").toLowerCase();
        const machineName = machine.machineName || username.toUpperCase();

        return {
            ...machine,
            username,
            machineName,
            role: machine.role || "client",
            balance: Number(machine.balance || machine.money || 0),
            money: Number(machine.money || machine.balance || 0),
            remainingSeconds: Number(machine.remainingSeconds || 0)
        };
    }

    function saveMachineToLocal(machine) {
        const m = normalizeMachine(machine);

        localStorage.setItem("session_user", m.username);
        sessionStorage.setItem("session_user", m.username);

        localStorage.setItem("username", m.username);
        sessionStorage.setItem("username", m.username);

        localStorage.setItem("machineName", m.machineName);
        sessionStorage.setItem("machineName", m.machineName);

        localStorage.setItem("role", m.role);
        sessionStorage.setItem("role", m.role);

        localStorage.setItem("cybernet_user", JSON.stringify(m));
        sessionStorage.setItem("cybernet_user", JSON.stringify(m));

        localStorage.setItem("currentUser", JSON.stringify(m));
        sessionStorage.setItem("currentUser", JSON.stringify(m));

        let db = JSON.parse(localStorage.getItem("cyber_db")) || {
            revenue: 0,
            menu: [],
            orders: [],
            users: {}
        };

        db.users = db.users || {};
        db.users[m.username] = {
            balance: m.balance,
            money: m.money,
            role: m.role,
            machineName: m.machineName,
            remainingSeconds: m.remainingSeconds
        };

        localStorage.setItem("cyber_db", JSON.stringify(db));

        return m;
    }

    function formatMoney(value) {
        return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    function formatTime(seconds) {
        const total = Number(seconds || 0);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;

        if (h > 0) {
            return `${h} giờ ${m} phút`;
        }

        if (m > 0) {
            return `${m} phút ${s} giây`;
        }

        return `${s} giây`;
    }

    function updateElementText(selectors, value) {
        selectors.forEach(selector => {
            const el = document.querySelector(selector);
            if (el) {
                el.innerText = value;
            }
        });
    }

    function renderMachine(machine) {
        const m = normalizeMachine(machine);

        updateElementText([
            "#machine-name",
            "#client-machine-name",
            "#current-machine",
            "#machineName",
            "[data-machine-name]"
        ], m.machineName);

        updateElementText([
            "#balance",
            "#client-balance",
            "#user-balance",
            "#money",
            "#user-money",
            "[data-balance]"
        ], formatMoney(m.balance));

        updateElementText([
            "#remaining-time",
            "#client-time",
            "#time-left",
            "#remainingTime",
            "[data-remaining-time]"
        ], formatTime(m.remainingSeconds));

        console.log("CyberNet AWS machine synced:", m);
    }

    async function loadMyMachineFromAws() {
        const username = getCurrentUsername();

        if (!username) {
            console.warn("CyberNet: không tìm thấy session_user");
            return;
        }

        const res = await fetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}`);
        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Không tải được thông tin máy từ AWS");
        }

        const machine = saveMachineToLocal(data.machine);
        renderMachine(machine);
    }

    async function startAwsMachineSync() {
        try {
            await loadMyMachineFromAws();
        } catch (err) {
            console.warn("CyberNet AWS machine sync failed:", err.message);
        }

        setInterval(async () => {
            try {
                await loadMyMachineFromAws();
            } catch (err) {
                console.warn("CyberNet AWS machine sync failed:", err.message);
            }
        }, 15000);
    }

    document.addEventListener("DOMContentLoaded", startAwsMachineSync);
})();
</script>
<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    const isAdminPage = location.pathname.toLowerCase().includes("admin");

    function getCurrentUserName() {
        if (isAdminPage) return "admin";

        return (
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            "client"
        ).toLowerCase();
    }

    function ensureAwsChatBox() {
        let box = document.getElementById("aws-chat-box");
        if (box) return box;

        box = document.createElement("div");
        box.id = "aws-chat-box";
        box.style.position = "fixed";
        box.style.right = "24px";
        box.style.bottom = "24px";
        box.style.width = "360px";
        box.style.height = "420px";
        box.style.zIndex = "99999";
        box.style.background = "#020617";
        box.style.border = "1px solid #0891b2";
        box.style.borderRadius = "14px";
        box.style.overflow = "hidden";
        box.style.boxShadow = "0 0 25px rgba(34,211,238,.18)";
        box.style.color = "#e5e7eb";
        box.style.fontFamily = "system-ui, sans-serif";

        box.innerHTML = `
            <div style="
                height:48px;
                display:flex;
                align-items:center;
                justify-content:space-between;
                padding:0 14px;
                background:#0f172a;
                border-bottom:1px solid rgba(34,211,238,.25);
                color:#22d3ee;
                font-weight:800;
                font-size:14px;
            ">
                <span>${isAdminPage ? "QUẢN TRỊ VIÊN - AWS CHAT" : "HỖ TRỢ NHÂN VIÊN - AWS CHAT"}</span>
                <button id="aws-chat-close" style="
                    background:none;
                    border:none;
                    color:#22d3ee;
                    font-weight:900;
                    cursor:pointer;
                    font-size:16px;
                ">×</button>
            </div>

            <div id="aws-chat-messages" style="
                height:310px;
                overflow-y:auto;
                padding:12px;
                display:flex;
                flex-direction:column;
                gap:8px;
                background:#020617;
            "></div>

            <div style="
                height:62px;
                display:flex;
                gap:8px;
                padding:10px;
                border-top:1px solid rgba(34,211,238,.25);
                background:#030712;
            ">
                <input id="aws-chat-input" type="text" placeholder="Nhập tin nhắn..." style="
                    flex:1;
                    background:#020617;
                    border:1px solid #334155;
                    border-radius:8px;
                    color:white;
                    padding:0 10px;
                    outline:none;
                ">
                <button id="aws-chat-send" style="
                    width:64px;
                    background:#0891b2;
                    color:white;
                    border:none;
                    border-radius:8px;
                    font-weight:800;
                    cursor:pointer;
                ">Gửi</button>
            </div>
        `;

        document.body.appendChild(box);

        document.getElementById("aws-chat-close").onclick = function () {
            box.style.display = "none";
        };

        return box;
    }

    function formatTime(iso) {
        if (!iso) return "";
        try {
            return new Date(iso).toLocaleTimeString("vi-VN", {
                hour: "2-digit",
                minute: "2-digit"
            });
        } catch {
            return "";
        }
    }

    function renderMessages(messages) {
        ensureAwsChatBox();

        const container = document.getElementById("aws-chat-messages");
        const currentUser = getCurrentUserName();

        container.innerHTML = messages.map(msg => {
            const sender = String(
                msg.username ||
                msg.sender ||
                msg.from ||
                "unknown"
            ).toLowerCase();

            const text =
                msg.message ||
                msg.text ||
                msg.content ||
                msg.msg ||
                "";

            const mine = sender === currentUser;
            const displaySender = sender.toUpperCase();

            return `
                <div style="
                    align-self:${mine ? "flex-end" : "flex-start"};
                    max-width:78%;
                    background:${mine ? "#0891b2" : "#1e293b"};
                    color:white;
                    border-radius:12px;
                    padding:8px 10px;
                    font-size:13px;
                    line-height:1.4;
                ">
                    <div style="
                        font-size:10px;
                        opacity:.75;
                        margin-bottom:3px;
                        font-weight:700;
                    ">
                        ${displaySender} · ${formatTime(msg.createdAt)}
                    </div>
                    <div>${String(text).replaceAll("<", "&lt;").replaceAll(">", "&gt;")}</div>
                </div>
            `;
        }).join("");

        container.scrollTop = container.scrollHeight;
    }

    async function loadAwsChat() {
        const res = await fetch(`${CLOUD_API_URL}/api/chat`);
        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Không tải được chat AWS");
        }

        const messages = data.messages || data.chats || data.items || [];
        renderMessages(messages);
    }

    async function sendAwsChat() {
        const input = document.getElementById("aws-chat-input");
        const text = input.value.trim();

        if (!text) {
            alert("Nội dung chat không được rỗng");
            return;
        }

        const username = getCurrentUserName();

        const res = await fetch(`${CLOUD_API_URL}/api/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                sender: username,
                from: username,
                message: text,
                text,
                content: text,
                msg: text
            })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Gửi chat AWS thất bại");
        }

        input.value = "";
        await loadAwsChat();
    }

    function startAwsChat() {
        ensureAwsChatBox();

        const sendBtn = document.getElementById("aws-chat-send");
        const input = document.getElementById("aws-chat-input");

        sendBtn.onclick = async function () {
            try {
                await sendAwsChat();
            } catch (err) {
                console.error(err);
                alert("Gửi chat thất bại: " + err.message);
            }
        };

        input.addEventListener("keydown", async function (event) {
            if (event.key === "Enter") {
                event.preventDefault();

                try {
                    await sendAwsChat();
                } catch (err) {
                    console.error(err);
                    alert("Gửi chat thất bại: " + err.message);
                }
            }
        });

        loadAwsChat().catch(console.warn);

        setInterval(() => {
            loadAwsChat().catch(console.warn);
        }, 3000);

        console.log("CyberNet AWS chat room started");
    }

    document.addEventListener("DOMContentLoaded", startAwsChat);
})();
</script>

<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    let products = [];
    let cart = JSON.parse(localStorage.getItem("final_aws_food_cart") || "[]");

    function money(value) {
        return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    function currentUsername() {
        return String(
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            "client"
        ).toLowerCase();
    }

    function currentMachineName() {
        return String(
            localStorage.getItem("machineName") ||
            sessionStorage.getItem("machineName") ||
            currentUsername().toUpperCase()
        );
    }

    function safeText(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    function displayName(name) {
        const n = String(name || "").trim();

        if (!n) return "Sản phẩm";
        if (n.includes("trá»") || n.toLowerCase().includes("my tr")) return "Mỳ trộn";
        if (n.includes("MÃ³n") || n.includes("áº£nh")) return "Món thử có ảnh";
        if (n.toLowerCase() === "mi tron") return "Mì trộn";
        if (n.toLowerCase() === "sting dau") return "Sting dâu";
        if (n.toLowerCase() === "banh mi") return "Bánh mì";

        return n;
    }

    function findElementByText(keywordList) {
        const keywords = keywordList.map(k => k.toLowerCase());

        return Array.from(document.querySelectorAll("h1,h2,h3,h4,div,p,span,section"))
            .find(el => {
                const text = String(el.innerText || "").toLowerCase();
                return keywords.some(k => text.includes(k));
            });
    }

    function hideOldEmptyMenuText() {
        Array.from(document.querySelectorAll("p,div,span")).forEach(el => {
            const text = String(el.innerText || "").toLowerCase();

            if (
                text.includes("quán đang hết món") ||
                text.includes("giỏ đang trống")
            ) {
                el.style.display = "none";
            }
        });

        const badOldPanels = [
            "aws-food-panel",
            "client-aws-menu-inline",
            "client-aws-cart-inline"
        ];

        badOldPanels.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.remove();
        });
    }

    function ensureMenuPanel() {
        let panel = document.getElementById("final-client-aws-menu");
        if (panel) return panel;

        panel = document.createElement("div");
        panel.id = "final-client-aws-menu";
        panel.innerHTML = `
            <h2>🍽 MENU AWS</h2>
            <div id="final-client-food-list" class="final-food-grid">
                Đang tải menu từ AWS...
            </div>
        `;

        const oldMenuTitle = findElementByText(["menu dịch vụ ăn uống", "menu dịch vụ", "menu"]);
        if (oldMenuTitle && oldMenuTitle.parentNode) {
            oldMenuTitle.parentNode.insertBefore(panel, oldMenuTitle.nextSibling);
        } else {
            document.body.prepend(panel);
        }

        return panel;
    }

    function ensureCartPanel() {
        let panel = document.getElementById("final-client-aws-cart");
        if (panel) return panel;

        panel = document.createElement("div");
        panel.id = "final-client-aws-cart";
        panel.innerHTML = `
            <h2>🛒 GIỎ HÀNG AWS</h2>
            <div id="final-client-cart-list">Giỏ hàng đang trống</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:12px;">
                <b>Tổng: <span id="final-client-cart-total" style="color:#34d399;">0đ</span></b>
                <button id="final-client-place-order" class="final-btn">ĐẶT MÓN</button>
            </div>
        `;

        const oldCartTitle = findElementByText(["giỏ hàng"]);
        if (oldCartTitle && oldCartTitle.parentNode) {
            oldCartTitle.parentNode.appendChild(panel);
        } else {
            ensureMenuPanel().after(panel);
        }

        document.getElementById("final-client-place-order").onclick = placeOrder;

        return panel;
    }

    function renderProducts() {
        ensureMenuPanel();

        const list = document.getElementById("final-client-food-list");

        const validProducts = products.filter(p => Number(p.stock || 0) > 0);

        if (!validProducts.length) {
            list.innerHTML = `<div style="color:#f87171;">Không có món hợp lệ trên AWS Products.</div>`;
            return;
        }

        list.innerHTML = validProducts.map(p => {
            const name = displayName(p.name);
            const img = p.imageUrl
                ? `<img src="${safeText(p.imageUrl)}" alt="${safeText(name)}">`
                : `<span>Chưa có ảnh</span>`;

            return `
                <div class="final-food-card">
                    <div class="final-food-img">${img}</div>
                    <div class="final-food-body">
                        <div class="final-food-name">${safeText(name)}</div>
                        <div class="final-food-meta">
                            💰 ${money(p.price)}<br>
                            📦 Còn: ${Number(p.stock || 0)}
                        </div>
                        <button class="final-btn" data-add-product="${safeText(p.id)}" style="width:100%;margin-top:12px;">
                            + THÊM VÀO GIỎ
                        </button>
                    </div>
                </div>
            `;
        }).join("");

        list.querySelectorAll("button[data-add-product]").forEach(btn => {
            btn.onclick = () => addToCart(btn.dataset.addProduct);
        });
    }

    function saveCart() {
        localStorage.setItem("final_aws_food_cart", JSON.stringify(cart));
    }

    function addToCart(productId) {
        const product = products.find(p => String(p.id) === String(productId));
        if (!product) {
            alert("Không tìm thấy món");
            return;
        }

        const item = cart.find(i => String(i.id) === String(product.id));

        if (item) {
            item.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name: displayName(product.name),
                price: Number(product.price || 0),
                quantity: 1
            });
        }

        saveCart();
        renderCart();
    }

    function changeQuantity(productId, delta) {
        const item = cart.find(i => String(i.id) === String(productId));
        if (!item) return;

        item.quantity += delta;

        if (item.quantity <= 0) {
            cart = cart.filter(i => String(i.id) !== String(productId));
        }

        saveCart();
        renderCart();
    }

    function removeItem(productId) {
        cart = cart.filter(i => String(i.id) !== String(productId));
        saveCart();
        renderCart();
    }

    function renderCart() {
        ensureCartPanel();

        const list = document.getElementById("final-client-cart-list");
        const totalEl = document.getElementById("final-client-cart-total");

        if (!cart.length) {
            list.innerHTML = `<div style="color:#94a3b8;">Giỏ hàng đang trống</div>`;
            totalEl.innerText = "0đ";
            return;
        }

        let total = 0;

        list.innerHTML = cart.map(item => {
            const subTotal = Number(item.price || 0) * Number(item.quantity || 1);
            total += subTotal;

            return `
                <div class="final-cart-row">
                    <div>
                        <b>${safeText(item.name)}</b>
                        <div style="font-size:12px;color:#94a3b8;">
                            ${money(item.price)} x ${item.quantity}
                        </div>
                    </div>

                    <div class="final-cart-actions">
                        <b style="color:#34d399;">${money(subTotal)}</b>
                        <button data-minus="${safeText(item.id)}">-</button>
                        <button data-plus="${safeText(item.id)}">+</button>
                        <button data-remove="${safeText(item.id)}" style="background:#dc2626;">x</button>
                    </div>
                </div>
            `;
        }).join("");

        totalEl.innerText = money(total);

        list.querySelectorAll("button[data-minus]").forEach(btn => {
            btn.onclick = () => changeQuantity(btn.dataset.minus, -1);
        });

        list.querySelectorAll("button[data-plus]").forEach(btn => {
            btn.onclick = () => changeQuantity(btn.dataset.plus, 1);
        });

        list.querySelectorAll("button[data-remove]").forEach(btn => {
            btn.onclick = () => removeItem(btn.dataset.remove);
        });
    }

    async function loadProducts() {
        hideOldEmptyMenuText();

        const res = await fetch(`${CLOUD_API_URL}/api/products`);
        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Không tải được Products AWS");
        }

        products = data.products || data.items || [];

        renderProducts();
        renderCart();

        console.log("Final client AWS menu loaded:", products);
    }

    async function placeOrder() {
        if (!cart.length) {
            alert("Giỏ hàng đang trống");
            return;
        }

        const totalAmount = cart.reduce((sum, item) => {
            return sum + Number(item.price || 0) * Number(item.quantity || 1);
        }, 0);

        const order = {
            machineName: currentMachineName(),
            username: currentUsername(),
            items: cart,
            itemsSummary: cart.map(i => `${i.quantity}x ${i.name}`).join(", "),
            totalAmount,
            paymentMethod: "Balance",
            status: "pending",
            time: new Date().toLocaleTimeString("vi-VN")
        };

        const res = await fetch(`${CLOUD_API_URL}/api/orders`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(order)
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            alert(data.message || "Đặt món thất bại");
            return;
        }

        cart = [];
        saveCart();
        renderCart();

        alert("Đặt món thành công. Chờ admin xác nhận!");
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadProducts().catch(err => {
            console.error(err);
            ensureMenuPanel();
            document.getElementById("final-client-food-list").innerHTML =
                `<div style="color:#f87171;">Lỗi tải menu AWS: ${safeText(err.message)}</div>`;
        });
    });
})();
</script>

<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    const originalFetch = window.fetch.bind(window);

    function isLocalEdgeUrl(url) {
        return typeof url === "string" &&
            (
                url.includes("127.0.0.1:3000/api/sync-devices") ||
                url.includes("localhost:3000/api/sync-devices") ||
                url.includes("127.0.0.1:3000/api/client-upload-screen") ||
                url.includes("localhost:3000/api/client-upload-screen") ||
                url.includes("127.0.0.1:3000/api/sync-update-screen") ||
                url.includes("localhost:3000/api/sync-update-screen")
            );
    }

    window.fetch = async function (input, init) {
        let url = "";

        if (typeof input === "string") {
            url = input;
        } else if (input && input.url) {
            url = input.url;
        }

        if (!isLocalEdgeUrl(url)) {
            return originalFetch(input, init);
        }

        try {
            return await originalFetch(input, init);
        } catch (err) {
            console.warn("Local Edge offline, skipped:", url);

            return new Response(JSON.stringify({
                success: false,
                offline: true,
                message: "Local Edge Server offline",
                url
            }), {
                status: 200,
                headers: {
                    "Content-Type": "application/json"
                }
            });
        }
    };

    function getCurrentUsername() {
        return String(
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            ""
        ).trim().toLowerCase();
    }

    async function updateAwsMachineStatus(status) {
        const username = getCurrentUsername();

        if (!username || username === "admin") {
            return;
        }

        try {
            await originalFetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}/status`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status,
                    source: "cloudfront-client",
                    lastSeenAt: new Date().toISOString()
                })
            });
        } catch (err) {
            console.warn("AWS machine heartbeat failed:", err.message);
        }
    }

    function startAwsHeartbeat() {
        const isClientPage = location.pathname.toLowerCase().includes("client");

        if (!isClientPage) {
            return;
        }

        updateAwsMachineStatus("playing");

        setInterval(function () {
            updateAwsMachineStatus("playing");
        }, 15000);

        window.addEventListener("beforeunload", function () {
            updateAwsMachineStatus("idle");
        });

        console.log("CyberNet AWS heartbeat started");
    }

    document.addEventListener("DOMContentLoaded", startAwsHeartbeat);
})();
</script>
<!-- EDGE_SAFE_MODE_END -->

    }

    async function startAwsScreenCapture() {
        try {

            console.warn("Không bật được AWS screen capture:", err.message);
            setStatus("Chưa cấp quyền", "#fbbf24");

    function stopAwsScreenCapture() {

<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    function getUsername() {
        return String(
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            "may01"
        ).trim().toLowerCase();
    }

    function readCartFromLocalStorage() {
        const keys = [
            "final_aws_food_cart",
            "aws_food_cart",
            "cart",
            "cybernet_cart",
            "food_cart"
        ];

        for (const key of keys) {
            try {
                const value = localStorage.getItem(key);
                if (!value) continue;

                const cart = JSON.parse(value);
                if (Array.isArray(cart) && cart.length) {
                    return cart;
                }
            } catch {}
        }

        return [];
    }

    function normalizeCartItems(cart) {
        return cart.map(item => {
            return {
                name: String(
                    item.name ||
                    item.productName ||
                    item.title ||
                    item.product_name ||
                    "Món ăn"
                ).slice(0, 50),

                quantity: Math.max(1, Number(
                    item.quantity ||
                    item.qty ||
                    item.count ||
                    1
                )),

                price: Math.max(0, Math.round(Number(
                    item.price ||
                    item.amount ||
                    item.unitPrice ||
                    0
                )))
            };
        }).filter(item => item.price > 0);
    }

    function calcTotal(items) {
        return items.reduce((sum, item) => {
            return sum + Number(item.price || 0) * Number(item.quantity || 1);
        }, 0);
    }

    function showOrderPayosNotice(text, color) {
        let box = document.getElementById("payos-order-notice");

        if (!box) {
            box = document.createElement("div");
            box.id = "payos-order-notice";
            box.style.cssText = `
                position: fixed;
                left: 50%;
                top: 24px;
                transform: translateX(-50%);
                z-index: 2147483647;
                min-width: 320px;
                max-width: 520px;
                padding: 14px 16px;
                border-radius: 16px;
                background: rgba(2, 6, 23, .97);
                color: white;
                border: 1px solid rgba(34,211,238,.55);
                box-shadow: 0 0 22px rgba(34,211,238,.35);
                font-size: 14px;
                font-weight: 800;
                line-height: 1.45;
                text-align: center;
            `;
            document.body.appendChild(box);
        }

        box.style.color = color || "#e5e7eb";
        box.innerText = text;
    }

    async function createFoodOrderAndOpenPayos() {
        const username = getUsername();
        const rawCart = readCartFromLocalStorage();
        const items = normalizeCartItems(rawCart);
        const total = calcTotal(items);

        if (!items.length || total < 1000) {
            alert("Giỏ hàng đang trống hoặc tổng tiền không hợp lệ.");
            return;
        }

        const ok = confirm(
            `Xác nhận đặt món và thanh toán PayOS?\n\nTổng tiền: ${total.toLocaleString("vi-VN")}đ`
        );

        if (!ok) return;

        showOrderPayosNotice("Đang tạo mã chuyển khoản PayOS...", "#fbbf24");

        try {
            const res = await fetch(`${CLOUD_API_URL}/api/payos/food-order`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    items,
                    amount: total,
                    total
                })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.success || !data.checkoutUrl) {
                throw new Error(data.message || "Không tạo được mã PayOS cho đơn món ăn.");
            }

            localStorage.setItem("payos_pending_food_order_code", String(data.order?.orderCode || ""));
            localStorage.setItem("payos_pending_food_order_total", String(total));
            localStorage.setItem("payos_pending_food_order_items", JSON.stringify(items));

            showOrderPayosNotice("Đã tạo mã PayOS. Đang chuyển sang trang thanh toán...", "#34d399");

            setTimeout(function () {
                window.location.href = data.checkoutUrl;
            }, 500);
        } catch (err) {
            console.error("Create PayOS food order failed:", err);
            showOrderPayosNotice("Lỗi tạo mã PayOS: " + err.message, "#f87171");
        }
    }

    function isPlaceOrderButton(el) {
        if (!el) return false;

        const text = String(el.innerText || el.value || "").trim().toUpperCase();

        return (
            text.includes("ĐẶT MÓN") ||
            text.includes("DAT MON") ||
            text.includes("ĐẶT HÀNG") ||
            text.includes("THANH TOÁN")
        );
    }

    function hookPlaceOrderButtons() {
        document.addEventListener("click", function (e) {
            const btn = e.target.closest("button, a, input[type='button'], input[type='submit']");
            if (!btn) return;

            if (!isPlaceOrderButton(btn)) return;

            const text = String(btn.innerText || btn.value || "").toUpperCase();

            // Không chặn nút nạp tiền máy riêng
            if (text.includes("NẠP TIỀN") || text.includes("NAP TIEN")) return;

            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();

            createFoodOrderAndOpenPayos();
        }, true);
    }

    window.cybernetCreateFoodOrderPayos = createFoodOrderAndOpenPayos;

    hookPlaceOrderButtons();

    console.log("CyberNet PayOS order flow enabled: ĐẶT MÓN -> PAYOS");
})();
</script>

<script>
(function () {
    const WS_URL = "wss://5z44p44tq8.execute-api.ap-southeast-1.amazonaws.com/prod";

    function getRole() {
        const path = location.pathname.toLowerCase();
        return path.includes("admin") ? "admin" : "client";
    }

    function getUsername() {
        return String(
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            (getRole() === "admin" ? "admin" : "may01")
        ).trim().toLowerCase();
    }

    let ws = null;
    let reconnectTimer = null;

    function callAny(names) {
        names.forEach(name => {
            try {
                if (typeof window[name] === "function") {
                    window[name]();
                }
            } catch (err) {
                console.warn("Realtime refresh failed:", name, err);
            }
        });
    }

    function handleRealtimeMessage(msg) {
        console.log("CyberNet realtime:", msg);

        const type = String(msg.type || "");

        if (type === "ordersChanged" || type === "payosChanged") {
            callAny([
                "cybernetRenderPayosFoodOrdersFixed",
                "cybernetRenderFixedOrders",
                "renderOrders",
                "loadOrders",
                "loadAwsOrders"
            ]);
        }

        if (type === "chatChanged") {
            callAny([
                "loadChat",
                "loadChatMessages",
                "renderChat",
                "renderAwsChat",
                "cybernetLoadChat"
            ]);
        }

        if (type === "machinesChanged" || type === "balanceChanged") {
            callAny([
                "loadMachines",
                "renderMachines",
                "loadAwsMachines",
                "renderMachineStatus",
                "loadCurrentMachine",
                "renderUserBalance"
            ]);
        }

        if (type === "productsChanged") {
            callAny([
                "loadProducts",
                "renderProducts",
                "loadAwsProducts",
                "renderAwsProducts",
                "loadFinalAwsProducts"
            ]);
        }

        if (type === "screenChanged") {
            callAny([
                "cybernetRenderScreenMonitor"
            ]);
        }
    }

    function connectRealtime() {
        if (!WS_URL || WS_URL === "None") {
            console.warn("CyberNet WebSocket URL missing");
            return;
        }

        try {
            ws = new WebSocket(
                WS_URL +
                "?role=" + encodeURIComponent(getRole()) +
                "&username=" + encodeURIComponent(getUsername())
            );

            window.cybernetRealtimeSocket = ws;

            ws.onopen = function () {
                console.log("CyberNet WebSocket connected");
                ws.send(JSON.stringify({
                    action: "ping",
                    role: getRole(),
                    username: getUsername()
                }));
            };

            ws.onmessage = function (event) {
                try {
                    handleRealtimeMessage(JSON.parse(event.data));
                } catch {
                    console.log("CyberNet WebSocket message:", event.data);
                }
            };

            ws.onclose = function () {
                console.warn("CyberNet WebSocket closed, reconnecting...");
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connectRealtime, 3000);
            };

            ws.onerror = function (err) {
                console.warn("CyberNet WebSocket error:", err);
            };
        } catch (err) {
            console.warn("CyberNet WebSocket connect failed:", err);
        }
    }

    function broadcastRealtime(type, payload) {
        try {
            if (!ws || ws.readyState !== WebSocket.OPEN) return false;

            ws.send(JSON.stringify({
                action: "broadcast",
                type,
                from: getUsername(),
                role: getRole(),
                payload: payload || {}
            }));

            return true;
        } catch (err) {
            console.warn("CyberNet broadcast failed:", err);
            return false;
        }
    }

    window.cybernetWsBroadcast = broadcastRealtime;

    const originalFetch = window.fetch;

    window.fetch = async function () {
        const args = arguments;
        const url = String(args[0] || "");
        const options = args[1] || {};
        const method = String(options.method || "GET").toUpperCase();

        const response = await originalFetch.apply(this, args);

        try {
            if (response.ok && method !== "GET") {
                if (url.includes("/api/orders") || url.includes("/api/payos")) {
                    broadcastRealtime("ordersChanged", { url, method });
                }

                if (url.includes("/api/chat")) {
                    broadcastRealtime("chatChanged", { url, method });
                }

                if (url.includes("/api/machines")) {
                    broadcastRealtime("machinesChanged", { url, method });
                }

                if (url.includes("/api/products")) {
                    broadcastRealtime("productsChanged", { url, method });
                }

                if (url.includes("/api/screens")) {
                    broadcastRealtime("screenChanged", { url, method });
                }
            }
        } catch (err) {
            console.warn("CyberNet realtime fetch hook failed:", err);
        }

        return response;
    };

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", connectRealtime);
    } else {
        connectRealtime();
    }

    console.log("CyberNet WebSocket realtime enabled");
})();
</script>

<script>
(function () {
    const CLOUD_API_URL =
        window.CYBERNET_CONFIG?.CLOUD_API_URL ||
        "https://kdp4o8qcb1.execute-api.ap-southeast-1.amazonaws.com";

    const UI_TICK_MS = 1000;
    const SERVER_SYNC_MS = 5000;

    let uiTimer = null;
    let serverTimer = null;
    let alreadyLoggedOut = false;

    let baseRemainingSeconds = 0;
    let baseBalance = 0;
    let hourlyRate = 15000;
    let lastServerSyncAt = Date.now();

    function getUsername() {
        return String(
            localStorage.getItem("session_user") ||
            sessionStorage.getItem("session_user") ||
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") ||
            "may01"
        ).trim().toLowerCase();
    }

    function money(value) {
        return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    function formatSeconds(totalSeconds) {
        const s = Math.max(0, Math.floor(Number(totalSeconds || 0)));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;

        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function currentRemainingSeconds() {
        const elapsed = Math.floor((Date.now() - lastServerSyncAt) / 1000);
        return Math.max(0, baseRemainingSeconds - elapsed);
    }

    function estimateBalanceBySeconds(seconds) {
        return Math.max(0, Math.ceil((Number(seconds || 0) * Number(hourlyRate || 15000)) / 3600));
    }

    function ensureRentalTimerBox() {
        let box = document.getElementById("cybernet-rental-timer-box");

        if (box) return box;

        box = document.createElement("div");
        box.id = "cybernet-rental-timer-box";
        box.innerHTML = `
            <div id="cybernet-rental-timer-label">THỜI GIAN CÒN LẠI</div>
            <div id="cybernet-rental-timer-value">--:--:--</div>
            <div id="cybernet-rental-money-left">Ví: --</div>
        `;

        const oldTimePanel = Array.from(document.querySelectorAll("div")).find(el =>
            String(el.innerText || "").toUpperCase().includes("THỜI GIAN CÒN LẠI")
        );

        if (oldTimePanel) {
            const root = oldTimePanel.closest("div");
            if (root) {
                root.replaceWith(box);
                return box;
            }
        }

        const logoutBtn = Array.from(document.querySelectorAll("button, a")).find(el =>
            String(el.innerText || "").toUpperCase().includes("ĐĂNG XUẤT")
        );

        if (logoutBtn && logoutBtn.parentElement) {
            logoutBtn.parentElement.insertBefore(box, logoutBtn);
        } else {
            document.body.prepend(box);
        }

        return box;
    }

    function renderLocalTimer() {
        ensureRentalTimerBox();

        const remain = currentRemainingSeconds();
        const estimatedBalance = estimateBalanceBySeconds(remain);

        const value = document.getElementById("cybernet-rental-timer-value");
        const moneyLeft = document.getElementById("cybernet-rental-money-left");

        if (value) {
            value.innerText = formatSeconds(remain);

            if (remain <= 300) {
                value.style.color = "#f87171";
            } else {
                value.style.color = "#22d3ee";
            }
        }

        if (moneyLeft) {
            moneyLeft.innerText = `Ví: ${money(estimatedBalance)} | ${money(hourlyRate)}/giờ`;
        }

        if (remain <= 0) {
            confirmExpiredAndLogout();
        }
    }

    function forceRentalLogout() {
        if (alreadyLoggedOut) return;

        alreadyLoggedOut = true;

        try {
            localStorage.removeItem("session_user");
            localStorage.removeItem("username");
            sessionStorage.removeItem("session_user");
            sessionStorage.removeItem("username");
        } catch {}

        alert("Tài khoản đã hết tiền/thời gian sử dụng. Hệ thống sẽ đăng xuất khỏi máy thuê.");

        location.href = "index.html?expired=1";
    }

    async function confirmExpiredAndLogout() {
        if (alreadyLoggedOut) return;

        const username = getUsername();

        try {
            const res = await fetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}/rental-timer?t=${Date.now()}`);
            const data = await res.json().catch(() => ({}));

            if (data.success) {
                applyServerTimerData(data);

                if (data.expired || Number(data.remainingSeconds || 0) <= 0 || Number(data.balance || 0) <= 0) {
                    forceRentalLogout();
                }

                return;
            }
        } catch {}

        forceRentalLogout();
    }

    function applyServerTimerData(data) {
        baseRemainingSeconds = Math.max(0, Number(data.remainingSeconds || 0));
        baseBalance = Math.max(0, Number(data.balance || 0));
        hourlyRate = Number(data.hourlyRate || 15000);
        lastServerSyncAt = Date.now();

        renderLocalTimer();
    }

    async function startRentalTimerOnServer() {
        const username = getUsername();

        try {
            await fetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}/start-rental`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: "{}"
            });
        } catch (err) {
            console.warn("Start rental failed:", err);
        }
    }

    async function syncRentalTimerFromServer() {
        if (alreadyLoggedOut) return;

        const username = getUsername();

        try {
            const res = await fetch(`${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}/rental-timer?t=${Date.now()}`);
            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.success) {
                console.warn("Rental timer sync failed:", data);
                return;
            }

            applyServerTimerData(data);

            if (data.expired || Number(data.remainingSeconds || 0) <= 0 || Number(data.balance || 0) <= 0) {
                forceRentalLogout();
                return;
            }

            if (typeof window.cybernetWsBroadcast === "function") {
                window.cybernetWsBroadcast("machinesChanged", {
                    username,
                    balance: data.balance,
                    remainingSeconds: data.remainingSeconds
                });
            }
        } catch (err) {
            console.warn("Rental timer sync error:", err);
        }
    }

    async function bootRentalTimer() {
        ensureRentalTimerBox();

        await startRentalTimerOnServer();
        await syncRentalTimerFromServer();

        clearInterval(uiTimer);
        clearInterval(serverTimer);

        uiTimer = setInterval(renderLocalTimer, UI_TICK_MS);
        serverTimer = setInterval(syncRentalTimerFromServer, SERVER_SYNC_MS);

        renderLocalTimer();
    }

    window.cybernetSyncRentalTimer = syncRentalTimerFromServer;
    window.cybernetRenderRentalTimer = renderLocalTimer;
    window.cybernetStartRentalTimer = bootRentalTimer;

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bootRentalTimer);
    } else {
        bootRentalTimer();
    }

    window.addEventListener("beforeunload", function () {
        try {
            const username = getUsername();
            navigator.sendBeacon(
                `${CLOUD_API_URL}/api/machines/${encodeURIComponent(username)}/stop-rental`,
                "{}"
            );
        } catch {}
    });

    console.log("CyberNet smooth rental timer enabled");
})();
</script>
